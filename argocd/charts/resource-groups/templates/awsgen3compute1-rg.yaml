# AwsGen3Compute1 — Tier 3: Compute (Modular RGD v1)
#
# EKS cluster with managed node group for Gen3 application workloads.
# Per Plan 02, this tier depends on Foundation (Tier 0) outputs.
#
# INCLUDED (6 resources + 1 conditional bridge):
#   IAM:       EKS cluster role, EKS node role
#   Security:  EKS additional security group (HTTPS 443)
#   Compute:   EKS cluster, managed node group
#   Bridge:    1 optional ConfigMap with cluster outputs
#
# COST: ~$350/month (EKS control plane $73 + nodes $277+)
# Register this RGD as a CRD but consider carefully before instantiating.
#
# NOT included (moved to other tiers per Plan 02):
#   EKS AccessEntry (not confirmed in ACK EKS controller v1.11.1)
#   ArgoCD cluster Secret (application-level, not infrastructure)
#
# PREREQUISITES:
#   1. Foundation tier deployed with createBridgeSecret=true
#
# CROSS-TIER: Reads Foundation bridge ConfigMap via externalRef.

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3compute1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Compute1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ── Foundation Bridge Reference ──────────────────────────────
      foundationBridgeName: string | required=true
      foundationNamespace: string | required=true

      # ── EKS Configuration ───────────────────────────────────────
      kubernetesVersion: string | default="1.30"
      nodeInstanceTypes: "[]string | required=true"
      nodeDesiredSize: integer | default=2
      nodeMinSize: integer | default=1
      nodeMaxSize: integer | default=4
      nodeDiskSize: integer | default=20
      nodeAMIType: string | default="AL2023_x86_64_STANDARD"

      # ── Bridge ───────────────────────────────────────────────────
      createBridgeSecret: boolean | default=true

    status:
      # IAM
      clusterRoleARN: ${clusterRole.status.?ackResourceMetadata.?arn.orValue("loading")}
      nodeRoleARN: ${nodeRole.status.?ackResourceMetadata.?arn.orValue("loading")}

      # Security
      eksSecurityGroupID: ${eksSecurityGroup.status.?id.orValue("loading")}

      # Compute
      eksClusterARN: ${eksCluster.status.?ackResourceMetadata.?arn.orValue("loading")}
      eksClusterEndpoint: ${eksCluster.status.?endpoint.orValue("loading")}
      eksClusterName: ${eksCluster.spec.name}
      nodeGroupARN: ${eksNodeGroup.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References
  # ====================================================================

    # ── Namespace (for account ID in IAM trust policies) ─────────────
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    # ── Foundation Bridge ConfigMap (cross-namespace) ────────────────
    - id: foundationBridge
      readyWhen:
        - ${foundationBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.foundationBridgeName}
          namespace: ${schema.spec.foundationNamespace}

  # ====================================================================
  # IAM: Cluster and Node Roles
  # ====================================================================

    # ── EKS Cluster Role ─────────────────────────────────────────────
    - id: clusterRole
      readyWhen:
        - ${clusterRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${clusterRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-cluster-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-cluster-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Service": "eks.amazonaws.com"},
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
            - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
          tags:
            - key: Name
              value: ${schema.spec.name}-cluster-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── EKS Node Role ────────────────────────────────────────────────
    - id: nodeRole
      readyWhen:
        - ${nodeRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${nodeRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-node-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-node-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Service": "ec2.amazonaws.com"},
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
            - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
            - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
          tags:
            - key: Name
              value: ${schema.spec.name}-node-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # SECURITY: EKS Security Group
  # ====================================================================

    # ── EKS Additional SG (HTTPS from VPC) ──────────────────────────
    - id: eksSecurityGroup
      readyWhen:
        - ${eksSecurityGroup.status.?id.orValue('null') != 'null'}
        - ${eksSecurityGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-eks-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-sg
          description: "EKS additional security group for ${schema.spec.name}"
          vpcID: ${foundationBridge.data['vpc-id']}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 443
              toPort: 443
              ipRanges:
                - cidrIP: ${foundationBridge.data['vpc-cidr']}
                  description: "HTTPS API server access from VPC"
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # COMPUTE: EKS Cluster + Managed Node Group
  # ====================================================================

    # ── EKS Cluster ──────────────────────────────────────────────────
    - id: eksCluster
      readyWhen:
        - ${eksCluster.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${eksCluster.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${eksCluster.status.?status.orValue('null') == 'ACTIVE'}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Cluster
        metadata:
          name: ${schema.spec.name}-eks
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks
          roleARN: ${clusterRole.status.?ackResourceMetadata.?arn}
          version: ${schema.spec.kubernetesVersion}
          resourcesVPCConfig:
            subnetIDs:
              - ${foundationBridge.data['public-subnet-1-id']}
              - ${foundationBridge.data['public-subnet-2-id']}
              - ${foundationBridge.data['private-subnet-1-id']}
              - ${foundationBridge.data['private-subnet-2-id']}
            securityGroupIDs:
              - ${eksSecurityGroup.status.?id}
            endpointPrivateAccess: true
            endpointPublicAccess: true
          encryptionConfig:
            - provider:
                keyARN: ${foundationBridge.data['platform-key-arn']}
              resources:
                - secrets
          tags:
            Name: ${schema.spec.name}-eks
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}

    # ── EKS Managed Node Group ───────────────────────────────────────
    - id: eksNodeGroup
      readyWhen:
        - ${eksNodeGroup.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${eksNodeGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${eksNodeGroup.status.?status.orValue('null') == 'ACTIVE'}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Nodegroup
        metadata:
          name: ${schema.spec.name}-nodegroup
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-nodegroup
          clusterName: ${eksCluster.spec.name}
          nodeRole: ${nodeRole.status.?ackResourceMetadata.?arn}
          subnets:
            - ${foundationBridge.data['private-subnet-1-id']}
            - ${foundationBridge.data['private-subnet-2-id']}
          scalingConfig:
            desiredSize: ${schema.spec.nodeDesiredSize}
            minSize: ${schema.spec.nodeMinSize}
            maxSize: ${schema.spec.nodeMaxSize}
          instanceTypes: ${schema.spec.nodeInstanceTypes}
          amiType: ${schema.spec.nodeAMIType}
          diskSize: ${schema.spec.nodeDiskSize}
          tags:
            Name: ${schema.spec.name}-nodegroup
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}

  # ====================================================================
  # BRIDGE: Compute Outputs ConfigMap (for downstream tiers)
  # ====================================================================

    - id: computeBridge
      includeWhen:
        - ${schema.spec.createBridgeSecret == true}
      readyWhen:
        - ${computeBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-compute-bridge
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: compute
            gen3.io/bridge: "true"
        data:
          cluster-role-arn: ${clusterRole.status.?ackResourceMetadata.?arn}
          node-role-arn: ${nodeRole.status.?ackResourceMetadata.?arn}
          eks-security-group-id: ${eksSecurityGroup.status.?id}
          eks-cluster-arn: ${eksCluster.status.?ackResourceMetadata.?arn}
          eks-cluster-endpoint: ${eksCluster.status.?endpoint}
          eks-cluster-name: ${eksCluster.spec.name}
          nodegroup-arn: ${eksNodeGroup.status.?ackResourceMetadata.?arn}
