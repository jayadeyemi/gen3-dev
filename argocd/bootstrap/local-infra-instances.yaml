# ======================================================================
# local-infra-instances — KRO infrastructure instances for gen3-dev
# ======================================================================
# Mirrors gen3-kro's fleet-infra-instances.yaml pattern.
# Renders the instances chart using cluster-fleet/local/infrastructure.yaml
# to create KRO Custom Resources (the test graph instance).
#
# In gen3-kro, this uses fleet_member: fleet-spoke-infra to match per-spoke
# cluster secrets created by Terraform. In gen3-dev, we reuse the
# control-plane cluster since everything runs on one Kind cluster.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-infra-instances
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: control-plane
  template:
    metadata:
      name: '{{.name}}-infra-instance'
    spec:
      project: default
      sources:
      - repoURL: '{{.metadata.annotations.addons_repo_url}}'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
        ref: values
      - repoURL: '{{.metadata.annotations.addons_repo_url}}'
        path: '{{.metadata.annotations.addons_repo_basepath}}charts/instances/'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
        helm:
          releaseName: 'infrastructure-instance'
          ignoreMissingValueFiles: true
          valueFiles:
            - '$values/{{.metadata.annotations.addons_repo_basepath}}cluster-fleet/{{.name}}/infrastructure.yaml'
          parameters:
            - name: awsAccountId
              value: '{{.metadata.annotations.aws_account_id}}'
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: true
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
