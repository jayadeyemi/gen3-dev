# AwsGen3Foundation1 — Tier 0: Foundation-Heavy (Modular RGD v1)
#
# Foundation-heavy architecture with feature flags. Absorbs ALL prep
# infrastructure (SGs, IAM roles, DB subnets, KMS keys) behind
# conditional resource groups controlled by databaseEnabled, computeEnabled,
# and searchEnabled feature flags.
#
# Per Plan 02 Revision 4 (02-modular-rgd-design.md), this tier creates:
#
# ALWAYS (16 resources, ~$37/month):
#   Networking: VPC, IGW, EIP, NAT Gateway, 2 route tables, 4 subnets
#   Security:   2 KMS keys (logging + platform)
#   Storage:    3 S3 buckets (logging, data, upload — KMS-encrypted)
#   Bridge:     1 foundationBridge ConfigMap (always present)
#
# CONDITIONAL — Database prep (includeWhen: databaseEnabled, 7 resources):
#   Networking: 2 DB subnets, 1 DB route table, 1 DB subnet group
#   Security:   1 Aurora SG (port 5432), 1 KMS key (RDS policy)
#   Bridge:     1 databasePrepBridge ConfigMap
#
# CONDITIONAL — Compute prep (includeWhen: computeEnabled, 4 resources):
#   IAM:        1 EKS cluster role (6 policies), 1 EKS node role (4 policies)
#   Security:   1 EKS SG (ports 443+10250)
#   Bridge:     1 computePrepBridge ConfigMap
#
# CONDITIONAL — Search prep (includeWhen: searchEnabled, 3 resources):
#   Security:   1 KMS key (OpenSearch/ElastiCache policy), 1 OpenSearch SG (443)
#   Bridge:     1 searchPrepBridge ConfigMap
#
# Creates up to 4 bridge ConfigMaps: foundationBridge (always) +
# databasePrepBridge, computePrepBridge, searchPrepBridge (conditional).
#
# Downstream tiers (Database1, Compute1, Search1) are thin — they read
# the per-capability prep bridges via externalRef.

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3foundation1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Foundation1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ── Network ──────────────────────────────────────────────────
      vpcCIDR: string | required=true
      publicSubnetCIDRs: "[]string | required=true"
      privateSubnetCIDRs: "[]string | required=true"
      availabilityZones: "[]string | required=true"

      # ── Storage ──────────────────────────────────────────────────
      loggingBucketName: string | required=true
      dataBucketName: string | required=true
      uploadBucketName: string | required=true

      # ── KMS ──────────────────────────────────────────────────────
      kmsKeyDescription: string | default="Gen3 encryption key"

      # ── Feature Flags (control conditional resource groups) ──────
      databaseEnabled: boolean | default=false
      computeEnabled: boolean | default=false
      searchEnabled: boolean | default=false

      # ── Database Prep Inputs (required when databaseEnabled=true)
      dbSubnetCIDRs: "[]string"

      # ── Bridge ───────────────────────────────────────────────────
      createBridgeSecret: boolean | default=true

    status:
      # Network
      vpcID: ${vpc.status.?vpcID.orValue("loading")}
      internetGatewayID: ${igw.status.?internetGatewayID.orValue("loading")}
      natGatewayID: ${natGateway1.status.?natGatewayID.orValue("loading")}
      eipAllocationID: ${eip1.status.?allocationID.orValue("loading")}
      publicSubnetIDs:
        - ${publicSubnet1.status.?subnetID.orValue("loading")}
        - ${publicSubnet2.status.?subnetID.orValue("loading")}
      privateSubnetIDs:
        - ${privateSubnet1.status.?subnetID.orValue("loading")}
        - ${privateSubnet2.status.?subnetID.orValue("loading")}
      routeTableIDs:
        public: ${publicRouteTable.status.?routeTableID.orValue("loading")}
        private: ${privateRouteTable.status.?routeTableID.orValue("loading")}

      # Security (KMS)
      loggingKeyARN: ${loggingKey.status.?ackResourceMetadata.?arn.orValue("loading")}
      platformKeyARN: ${platformKey.status.?ackResourceMetadata.?arn.orValue("loading")}

      # Storage (S3)
      loggingBucketARN: ${loggingBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
      dataBucketARN: ${dataBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
      uploadBucketARN: ${uploadBucket.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: Namespace Reference (reads owner-account-id annotation)
  # ====================================================================
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

  # ####################################################################
  # ALWAYS-PRESENT RESOURCES (16)
  # ####################################################################

  # ====================================================================
  # NETWORKING: VPC, Gateways, Route Tables, Subnets
  # ====================================================================

    # ── VPC ────────────────────────────────────────────────────────────
    - id: vpc
      readyWhen:
        - ${vpc.status.?vpcID.orValue('null') != 'null'}
        - ${vpc.status.?state.orValue('null') == 'available'}
        - ${vpc.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: VPC
        metadata:
          name: ${schema.spec.name}-vpc
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          cidrBlocks:
            - ${schema.spec.vpcCIDR}
          enableDNSHostnames: true
          enableDNSSupport: true
          tags:
            - key: Name
              value: ${schema.spec.name}-vpc
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Elastic IP ────────────────────────────────────────────────────
    - id: eip1
      readyWhen:
        - ${eip1.status.?allocationID.orValue('null') != 'null'}
        - ${eip1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: ElasticIPAddress
        metadata:
          name: ${schema.spec.name}-eip-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          tags:
            - key: Name
              value: ${schema.spec.name}-eip-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Internet Gateway ──────────────────────────────────────────────
    - id: igw
      readyWhen:
        - ${igw.status.?internetGatewayID.orValue('null') != 'null'}
        - ${igw.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${igw.status.?attachments.orValue([]).exists(a, a.state == "available")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: InternetGateway
        metadata:
          name: ${schema.spec.name}-igw
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-igw
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Public Route Table (routes to IGW) ────────────────────────────
    - id: publicRouteTable
      readyWhen:
        - ${publicRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${publicRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-public-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              gatewayID: ${igw.status.?internetGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-rt
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Public Subnet 1 ──────────────────────────────────────────────
    - id: publicSubnet1
      readyWhen:
        - ${publicSubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${publicSubnet1.status.?state.orValue('null') == 'available'}
        - ${publicSubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-public-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.publicSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: true
          routeTableRefs:
            - from:
                name: ${publicRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"

    # ── Public Subnet 2 ──────────────────────────────────────────────
    - id: publicSubnet2
      readyWhen:
        - ${publicSubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${publicSubnet2.status.?state.orValue('null') == 'available'}
        - ${publicSubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-public-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.publicSubnetCIDRs[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: true
          routeTableRefs:
            - from:
                name: ${publicRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-subnet-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"

    # ── NAT Gateway (in public subnet 1) ──────────────────────────────
    - id: natGateway1
      readyWhen:
        - ${natGateway1.status.?natGatewayID.orValue('null') != 'null'}
        - ${natGateway1.status.?state.orValue('null') == 'available'}
        - ${natGateway1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: NATGateway
        metadata:
          name: ${schema.spec.name}-nat-gw-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          allocationID: ${eip1.status.?allocationID}
          subnetID: ${publicSubnet1.status.?subnetID}
          tags:
            - key: Name
              value: ${schema.spec.name}-nat-gw-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Private Route Table (routes to NAT) ──────────────────────────
    - id: privateRouteTable
      readyWhen:
        - ${privateRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${privateRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-private-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              natGatewayID: ${natGateway1.status.?natGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-private-rt
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Private Subnet 1 ─────────────────────────────────────────────
    - id: privateSubnet1
      readyWhen:
        - ${privateSubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${privateSubnet1.status.?state.orValue('null') == 'available'}
        - ${privateSubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-private-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.privateSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${privateRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-private-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/internal-elb
              value: "1"
            - key: kubernetes.io/cluster/${schema.spec.name}
              value: owned

    # ── Private Subnet 2 ─────────────────────────────────────────────
    - id: privateSubnet2
      readyWhen:
        - ${privateSubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${privateSubnet2.status.?state.orValue('null') == 'available'}
        - ${privateSubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-private-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.privateSubnetCIDRs[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${privateRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-private-subnet-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/internal-elb
              value: "1"
            - key: kubernetes.io/cluster/${schema.spec.name}
              value: owned

  # ====================================================================
  # SECURITY: KMS Keys (always present)
  # ====================================================================

    # ── Logging Key (S3 access logs, CloudTrail, VPC Flow Logs) ──────
    - id: loggingKey
      readyWhen:
        - ${loggingKey.status.?keyID.orValue('null') != 'null'}
        - ${loggingKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${loggingKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-logging-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for logging and audit data (CloudTrail, VPC Flow Logs, security logs)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-logging-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: logging-audit

    # ── Platform Key (EKS secrets, S3 app buckets, general encryption)
    - id: platformKey
      readyWhen:
        - ${platformKey.status.?keyID.orValue('null') != 'null'}
        - ${platformKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${platformKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-platform-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for platform services (EKS secrets, S3 app buckets, EFS)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow EKS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "eks.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-platform-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: platform

  # ====================================================================
  # STORAGE: S3 Buckets (KMS-encrypted)
  # ====================================================================

    # ── Logging Bucket ────────────────────────────────────────────────
    - id: loggingBucket
      readyWhen:
        - ${loggingBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${loggingBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-logging-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.loggingBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${loggingKey.status.?ackResourceMetadata.?arn}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.loggingBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: logging

    # ── Data Bucket ───────────────────────────────────────────────────
    - id: dataBucket
      readyWhen:
        - ${dataBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dataBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-data-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.dataBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${platformKey.status.?ackResourceMetadata.?arn}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.dataBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: data

    # ── Upload Bucket ─────────────────────────────────────────────────
    - id: uploadBucket
      readyWhen:
        - ${uploadBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${uploadBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-upload-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.uploadBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${platformKey.status.?ackResourceMetadata.?arn}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.uploadBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: upload

  # ====================================================================
  # BRIDGE: Foundation Outputs ConfigMap (always present)
  # ====================================================================

    - id: foundationBridge
      includeWhen:
        - ${schema.spec.createBridgeSecret == true}
      readyWhen:
        - ${foundationBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-foundation-bridge
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: foundation
            gen3.io/bridge: "true"
        data:
          vpc-id: ${vpc.status.?vpcID}
          vpc-cidr: ${schema.spec.vpcCIDR}
          igw-id: ${igw.status.?internetGatewayID}
          eip-allocation-id: ${eip1.status.?allocationID}
          nat-gateway-id: ${natGateway1.status.?natGatewayID}
          public-subnet-1-id: ${publicSubnet1.status.?subnetID}
          public-subnet-2-id: ${publicSubnet2.status.?subnetID}
          private-subnet-1-id: ${privateSubnet1.status.?subnetID}
          private-subnet-2-id: ${privateSubnet2.status.?subnetID}
          public-route-table-id: ${publicRouteTable.status.?routeTableID}
          private-route-table-id: ${privateRouteTable.status.?routeTableID}
          logging-key-arn: ${loggingKey.status.?ackResourceMetadata.?arn}
          platform-key-arn: ${platformKey.status.?ackResourceMetadata.?arn}
          logging-bucket-arn: ${loggingBucket.status.?ackResourceMetadata.?arn}
          data-bucket-arn: ${dataBucket.status.?ackResourceMetadata.?arn}
          upload-bucket-arn: ${uploadBucket.status.?ackResourceMetadata.?arn}

  # ####################################################################
  # CONDITIONAL: DATABASE PREP (includeWhen: databaseEnabled)
  # ####################################################################

  # ====================================================================
  # DB NETWORKING: Route Table, Subnets, Subnet Group
  # ====================================================================

    # ── DB Route Table (routes to NAT) ───────────────────────────────
    - id: dbRouteTable
      includeWhen:
        - ${schema.spec.databaseEnabled == true}
      readyWhen:
        - ${dbRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${dbRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-db-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              natGatewayID: ${natGateway1.status.?natGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-rt
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── DB Subnet 1 ──────────────────────────────────────────────────
    - id: dbSubnet1
      includeWhen:
        - ${schema.spec.databaseEnabled == true}
      readyWhen:
        - ${dbSubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${dbSubnet1.status.?state.orValue('null') == 'available'}
        - ${dbSubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-db-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.dbSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${dbRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Tier
              value: database

    # ── DB Subnet 2 ──────────────────────────────────────────────────
    - id: dbSubnet2
      includeWhen:
        - ${schema.spec.databaseEnabled == true}
      readyWhen:
        - ${dbSubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${dbSubnet2.status.?state.orValue('null') == 'available'}
        - ${dbSubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-db-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.dbSubnetCIDRs[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${dbRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Tier
              value: database

    # ── DB Subnet Group ──────────────────────────────────────────────
    - id: dbSubnetGroup
      includeWhen:
        - ${schema.spec.databaseEnabled == true}
      readyWhen:
        - ${dbSubnetGroup.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dbSubnetGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBSubnetGroup
        metadata:
          name: ${schema.spec.name}-db-subnet-group
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-db-subnet-group
          description: "DB subnet group for ${schema.spec.name}"
          subnetIDs:
            - ${dbSubnet1.status.?subnetID}
            - ${dbSubnet2.status.?subnetID}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-group
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # DB SECURITY: Aurora Security Group + Database KMS Key
  # ====================================================================

    # ── Aurora SG (port 5432 from VPC CIDR) ──────────────────────────
    - id: auroraSg
      includeWhen:
        - ${schema.spec.databaseEnabled == true}
      readyWhen:
        - ${auroraSg.status.?id.orValue('null') != 'null'}
        - ${auroraSg.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-aurora-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aurora-sg
          description: "PostgreSQL access for ${schema.spec.name}"
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 5432
              toPort: 5432
              ipRanges:
                - cidrIP: ${schema.spec.vpcCIDR}
                  description: "PostgreSQL from VPC"
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Database Key (RDS-specific service policy) ───────────────────
    - id: databaseKey
      includeWhen:
        - ${schema.spec.databaseEnabled == true}
      readyWhen:
        - ${databaseKey.status.?keyID.orValue('null') != 'null'}
        - ${databaseKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${databaseKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-database-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for Aurora PostgreSQL encryption (${schema.spec.name})"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow RDS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "rds.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey",
                    "kms:ReEncryptFrom",
                    "kms:ReEncryptTo"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-database-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: database

  # ====================================================================
  # DB BRIDGE: Database Prep Outputs ConfigMap
  # ====================================================================

    - id: databasePrepBridge
      includeWhen:
        - ${schema.spec.databaseEnabled == true}
      readyWhen:
        - ${databasePrepBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-database-prep-bridge
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: foundation
            gen3.io/bridge: "true"
            gen3.io/prep-for: database
        data:
          db-subnet-1-id: ${dbSubnet1.status.?subnetID}
          db-subnet-2-id: ${dbSubnet2.status.?subnetID}
          db-route-table-id: ${dbRouteTable.status.?routeTableID}
          db-subnet-group-name: ${dbSubnetGroup.spec.name}
          database-key-arn: ${databaseKey.status.?ackResourceMetadata.?arn}
          aurora-sg-id: ${auroraSg.status.?id}

  # ####################################################################
  # CONDITIONAL: COMPUTE PREP (includeWhen: computeEnabled)
  # ####################################################################

  # ====================================================================
  # COMPUTE IAM: Cluster Role (6 policies) + Node Role (4 policies)
  # ====================================================================

    # ── EKS Cluster Role (all 6 policies for Standard + Auto Mode) ───
    - id: clusterRole
      includeWhen:
        - ${schema.spec.computeEnabled == true}
      readyWhen:
        - ${clusterRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${clusterRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-cluster-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-cluster-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Service": "eks.amazonaws.com"},
                  "Action": ["sts:AssumeRole", "sts:TagSession"]
                }
              ]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
            - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
            - arn:aws:iam::aws:policy/AmazonEKSComputePolicy
            - arn:aws:iam::aws:policy/AmazonEKSBlockStoragePolicy
            - arn:aws:iam::aws:policy/AmazonEKSLoadBalancingPolicy
            - arn:aws:iam::aws:policy/AmazonEKSNetworkingPolicy
          tags:
            - key: Name
              value: ${schema.spec.name}-cluster-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── EKS Node Role (dual trust: ec2 + eks for Auto Mode) ──────────
    - id: nodeRole
      includeWhen:
        - ${schema.spec.computeEnabled == true}
      readyWhen:
        - ${nodeRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${nodeRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-node-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-node-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Service": ["ec2.amazonaws.com", "eks.amazonaws.com"]},
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
            - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
            - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
            - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPullOnly
          tags:
            - key: Name
              value: ${schema.spec.name}-node-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # COMPUTE SECURITY: EKS Security Group (443 + 10250)
  # ====================================================================

    # ── EKS Additional SG (API server + kubelet from VPC) ────────────
    - id: eksSecurityGroup
      includeWhen:
        - ${schema.spec.computeEnabled == true}
      readyWhen:
        - ${eksSecurityGroup.status.?id.orValue('null') != 'null'}
        - ${eksSecurityGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-eks-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-sg
          description: "EKS additional security group for ${schema.spec.name}"
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 443
              toPort: 443
              ipRanges:
                - cidrIP: ${schema.spec.vpcCIDR}
                  description: "HTTPS API server access from VPC"
            - ipProtocol: tcp
              fromPort: 10250
              toPort: 10250
              ipRanges:
                - cidrIP: ${schema.spec.vpcCIDR}
                  description: "Kubelet API from VPC"
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # COMPUTE BRIDGE: Compute Prep Outputs ConfigMap
  # ====================================================================

    - id: computePrepBridge
      includeWhen:
        - ${schema.spec.computeEnabled == true}
      readyWhen:
        - ${computePrepBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-compute-prep-bridge
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: foundation
            gen3.io/bridge: "true"
            gen3.io/prep-for: compute
        data:
          eks-security-group-id: ${eksSecurityGroup.status.?id}
          cluster-role-arn: ${clusterRole.status.?ackResourceMetadata.?arn}
          node-role-arn: ${nodeRole.status.?ackResourceMetadata.?arn}

  # ####################################################################
  # CONDITIONAL: SEARCH PREP (includeWhen: searchEnabled)
  # ####################################################################

  # ====================================================================
  # SEARCH SECURITY: Search KMS Key + OpenSearch SG
  # ====================================================================

    # ── Search Key (OpenSearch + ElastiCache service policy) ─────────
    - id: searchKey
      includeWhen:
        - ${schema.spec.searchEnabled == true}
      readyWhen:
        - ${searchKey.status.?keyID.orValue('null') != 'null'}
        - ${searchKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${searchKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-search-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for OpenSearch and ElastiCache encryption (${schema.spec.name})"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow Search services to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": ["es.amazonaws.com", "elasticache.amazonaws.com"]},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-search-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: search

    # ── OpenSearch SG (HTTPS from VPC) ───────────────────────────────
    - id: openSearchSg
      includeWhen:
        - ${schema.spec.searchEnabled == true}
      readyWhen:
        - ${openSearchSg.status.?id.orValue('null') != 'null'}
        - ${openSearchSg.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-opensearch-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-opensearch-sg
          description: "OpenSearch access for ${schema.spec.name}"
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 443
              toPort: 443
              ipRanges:
                - cidrIP: ${schema.spec.vpcCIDR}
                  description: "HTTPS to OpenSearch from VPC"
          tags:
            - key: Name
              value: ${schema.spec.name}-opensearch-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # SEARCH BRIDGE: Search Prep Outputs ConfigMap
  # ====================================================================

    - id: searchPrepBridge
      includeWhen:
        - ${schema.spec.searchEnabled == true}
      readyWhen:
        - ${searchPrepBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-search-prep-bridge
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: foundation
            gen3.io/bridge: "true"
            gen3.io/prep-for: search
        data:
          search-key-arn: ${searchKey.status.?ackResourceMetadata.?arn}
          opensearch-sg-id: ${openSearchSg.status.?id}
