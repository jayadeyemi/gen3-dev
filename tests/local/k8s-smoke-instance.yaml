# K8s Smoke Test Instance
#
# Applies the LocalSmokeTest CRD (registered by k8s-smoke-rg.yaml).
# Use this to validate the KRO graph engine end-to-end in Kind.
#
# Usage:
#   kubectl apply -f tests/local/k8s-smoke-instance.yaml
#   kubectl get localsmoketests -w
#   kubectl delete -f tests/local/k8s-smoke-instance.yaml

apiVersion: v1alpha1
kind: LocalSmokeTest
metadata:
  name: smoke-1
  namespace: default
spec:
  name: smoke-app
  namespace: smoke-test
  environment: local
  image: nginx:1.27-alpine
  replicas: 1
  port: 80
  serviceEnabled: true
