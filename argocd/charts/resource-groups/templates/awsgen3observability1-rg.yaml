# AwsGen3Observability1 — Tier 6: LGTM Observability Stack (Modular RGD v1)
#
# Creates ArgoCD Application CRs for the LGTM observability stack:
#   - Grafana (dashboards, visualization)
#   - Loki (log aggregation)
#   - Tempo (distributed tracing)
#   - Alloy (telemetry collection — replaces Promtail/OTel Collector)
#
# Each component is conditional via feature flags. All are deployed as
# ArgoCD Applications targeting the spoke EKS cluster.
#
# This RGD does NOT deploy AWS resources — it creates pure Kubernetes
# resources (ArgoCD Applications + ConfigMap). No ACK controllers needed.
#
# PREREQUISITES:
#   1. Foundation1 deployed with foundationBridge
#   2. Compute1 deployed with computeBridge
#
# OUTPUT: observabilityBridge ConfigMap with deployed component info.

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3observability1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Observability1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"

      # ── ArgoCD ───────────────────────────────────────────────────
      argoCDNamespace: string | default="argocd"
      argoCDProject: string | default="default"

      # ── Bridge References ────────────────────────────────────────
      computeBridgeName: string | required=true
      computeNamespace: string | required=true

      # ── Feature Flags ───────────────────────────────────────────
      grafanaEnabled: boolean | default=true
      lokiEnabled: boolean | default=true
      tempoEnabled: boolean | default=false
      alloyEnabled: boolean | default=true

      # ── Chart Versions ─────────────────────────────────────────
      grafanaChartVersion: string | default="8.12.1"
      lokiChartVersion: string | default="6.29.0"
      tempoChartVersion: string | default="1.18.2"
      alloyChartVersion: string | default="0.12.5"

      # ── Observability Namespace on Spoke ────────────────────────
      observabilityNamespace: string | default="monitoring"

      # ── Auto Sync ───────────────────────────────────────────────
      autoSync: boolean | default=false

    status:
      ready: ${spokeNamespace.metadata.?name.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References
  # ====================================================================

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: computeBridge
      readyWhen:
        - ${computeBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.computeBridgeName}
          namespace: ${schema.spec.computeNamespace}

  # ====================================================================
  # ARGOCD: Grafana Application
  # ====================================================================

    - id: grafanaApp
      includeWhen:
        - ${schema.spec.grafanaEnabled == true}
      readyWhen:
        - ${grafanaApp.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-grafana
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: observability
            gen3.io/spoke: ${schema.spec.name}
          finalizers:
            - resources-finalizer.argocd.argoproj.io
        spec:
          project: ${schema.spec.argoCDProject}
          source:
            repoURL: https://grafana.github.io/helm-charts
            chart: grafana
            targetRevision: ${schema.spec.grafanaChartVersion}
            helm:
              releaseName: ${schema.spec.name}-grafana
              values: |
                persistence:
                  enabled: true
                  size: 5Gi
                datasources:
                  datasources.yaml:
                    apiVersion: 1
                    datasources:
                      - name: Loki
                        type: loki
                        url: http://${schema.spec.name}-loki:3100
                        access: proxy
                        isDefault: false
          destination:
            server: ${computeBridge.data['eks-cluster-endpoint']}
            namespace: ${schema.spec.observabilityNamespace}
          syncPolicy:
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true

  # ====================================================================
  # ARGOCD: Loki Application
  # ====================================================================

    - id: lokiApp
      includeWhen:
        - ${schema.spec.lokiEnabled == true}
      readyWhen:
        - ${lokiApp.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-loki
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: observability
            gen3.io/spoke: ${schema.spec.name}
          finalizers:
            - resources-finalizer.argocd.argoproj.io
        spec:
          project: ${schema.spec.argoCDProject}
          source:
            repoURL: https://grafana.github.io/helm-charts
            chart: loki
            targetRevision: ${schema.spec.lokiChartVersion}
            helm:
              releaseName: ${schema.spec.name}-loki
              values: |
                deploymentMode: SingleBinary
                loki:
                  auth_enabled: false
                  commonConfig:
                    replication_factor: 1
                  storage:
                    type: filesystem
                singleBinary:
                  replicas: 1
                  persistence:
                    size: 10Gi
                read:
                  replicas: 0
                write:
                  replicas: 0
                backend:
                  replicas: 0
          destination:
            server: ${computeBridge.data['eks-cluster-endpoint']}
            namespace: ${schema.spec.observabilityNamespace}
          syncPolicy:
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true

  # ====================================================================
  # ARGOCD: Tempo Application
  # ====================================================================

    - id: tempoApp
      includeWhen:
        - ${schema.spec.tempoEnabled == true}
      readyWhen:
        - ${tempoApp.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-tempo
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: observability
            gen3.io/spoke: ${schema.spec.name}
          finalizers:
            - resources-finalizer.argocd.argoproj.io
        spec:
          project: ${schema.spec.argoCDProject}
          source:
            repoURL: https://grafana.github.io/helm-charts
            chart: tempo
            targetRevision: ${schema.spec.tempoChartVersion}
            helm:
              releaseName: ${schema.spec.name}-tempo
              values: |
                tempo:
                  storage:
                    trace:
                      backend: local
          destination:
            server: ${computeBridge.data['eks-cluster-endpoint']}
            namespace: ${schema.spec.observabilityNamespace}
          syncPolicy:
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true

  # ====================================================================
  # ARGOCD: Alloy Application (telemetry collector)
  # ====================================================================

    - id: alloyApp
      includeWhen:
        - ${schema.spec.alloyEnabled == true}
      readyWhen:
        - ${alloyApp.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-alloy
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: observability
            gen3.io/spoke: ${schema.spec.name}
          finalizers:
            - resources-finalizer.argocd.argoproj.io
        spec:
          project: ${schema.spec.argoCDProject}
          source:
            repoURL: https://grafana.github.io/helm-charts
            chart: alloy
            targetRevision: ${schema.spec.alloyChartVersion}
            helm:
              releaseName: ${schema.spec.name}-alloy
              values: |
                alloy:
                  configMap:
                    create: true
          destination:
            server: ${computeBridge.data['eks-cluster-endpoint']}
            namespace: ${schema.spec.observabilityNamespace}
          syncPolicy:
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true

  # ====================================================================
  # BRIDGE: Observability Outputs ConfigMap
  # ====================================================================

    - id: observabilityBridge
      readyWhen:
        - ${observabilityBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-observability-bridge
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: observability
            gen3.io/bridge: "true"
        data:
          observability-namespace: ${schema.spec.observabilityNamespace}
          target-cluster: ${computeBridge.data['eks-cluster-endpoint']}
