{{- range $name, $instance := .Values.instances }}
{{- if $instance.namespace }}
---
# Namespace for KRO instance. The owner-account-id annotation is injected
# via ArgoCD: kind-local-test.sh sets aws_account_id on the ArgoCD cluster
# Secret, the ApplicationSet passes it as a Helm parameter, and this
# template applies it to the namespace. This avoids storing the AWS
# account ID in git.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $instance.namespace | default "default" }}
  labels:
    app.kubernetes.io/managed-by: instances-chart
  {{- if $.Values.awsAccountId }}
  annotations:
    services.k8s.aws/owner-account-id: {{ $.Values.awsAccountId | quote }}
  {{- end }}
{{- end }}
---
apiVersion: kro.run/v1alpha1
kind: {{ $instance.kind | required "instance kind is required" }}
metadata:
  name: {{ $name }}
  namespace: {{ $instance.namespace | default "default" }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $instance.syncWave | default "1" | quote }}
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true,Prune=false
    {{- with $instance.links }}
    {{- range $linkName, $linkUrl := . }}
    link.argocd.argoproj.io/{{ $linkName }}: {{ $linkUrl | quote }}
    {{- end }}
    {{- end }}
    {{- with $instance.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    app.kubernetes.io/managed-by: instances-chart
    environment: {{ $instance.environment | default "dev" | quote }}
    {{- with $instance.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- toYaml $instance.spec | nindent 2 }}
{{- end }}
