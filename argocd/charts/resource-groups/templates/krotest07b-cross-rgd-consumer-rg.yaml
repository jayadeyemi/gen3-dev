# KRO Capability Test 7b: Cross-RGD Status Consumer (Real ACK Resources)
#
# Companion to krotest07a-cross-rgd-producer-rg.yaml.
# Reads the bridge ConfigMap (which contains real ACK EC2 status values:
# vpc.status.vpcID and sg.status.id) via externalRef, then creates a real
# SecurityGroup in the producer's VPC that references the producer SG
# using an AWS userIDGroupPairs ingress rule.
#
# WHAT THIS TESTS:
#   - externalRef blocking: consumer graph waits until bridge ConfigMap exists
#   - Cross-namespace externalRef: consumer NS ≠ producer NS
#   - Real AWS resource ID consumption: bridgeData.data.vpc_id used in spec
#   - Real AWS SG-to-SG rule: userIDGroupPairs with producer's sg.status.id
#   - Status propagation: consumer SG ID accessible in consumer status
#
# This validates the core cross-RGD pattern for gen3-kro modular tiers:
#   Foundation SG ID → bridge ConfigMap → Network/DB tier SG ingressRule
#
# Deployed via ArgoCD — instances defined in:
#   argocd/cluster-fleet/local-aws-dev/infrastructure.yaml

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: krotest07b-cross-rgd-consumer
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: KroTest07Consumer
    spec:
      name: string | required=true
      namespace: string | default="kro-test-crossrgd-consumer"
      environment: string | default="test"
      region: string | default="us-east-1"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
      project: string | default="gen3-dev"

      # Points at the bridge ConfigMap from the producer RGD.
      # Instance sets this to: ${producerName}-crossrgd-bridge
      producerBridgeName: string | required=true
      # Namespace where the bridge ConfigMap lives (producer's namespace)
      producerNamespace: string | required=true

    status:
      namespacePhase: ${targetNamespace.status.phase}
      # Values consumed from producer via externalRef
      consumedVpcId: ${bridgeData.data.vpc_id}
      consumedProducerSgId: ${bridgeData.data.base_sg_id}
      # Consumer SG created using those consumed values
      consumerSgId: ${consumerSg.status.?id.orValue("loading")}
      # Summary proving the full data chain
      summaryConfigName: ${crossRgdSummary.metadata.?name.orValue("loading")}

  resources:
    # ================================================================
    # Consumer Namespace
    # ================================================================
    - id: targetNamespace
      readyWhen:
        - ${targetNamespace.status.phase == "Active"}
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            test-suite: kro-capabilities
            test-name: cross-rgd-consumer

    # ================================================================
    # externalRef — reads the bridge ConfigMap from the PRODUCER namespace
    #
    # KEY MECHANISM: Instructs KRO to read an existing K8s resource
    # created by the producer RGD. KRO will WAIT for this ConfigMap to
    # exist before proceeding — providing implicit cross-RGD ordering.
    #
    # Cross-namespace: producerNamespace (kro-test-crossrgd) ≠
    #                  consumer namespace (kro-test-crossrgd-consumer)
    # ================================================================
    - id: bridgeData
      type: externalRef
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.producerBridgeName}
          namespace: ${schema.spec.producerNamespace}

    # ================================================================
    # Consumer SecurityGroup — created in the PRODUCER'S VPC
    #
    # Uses real AWS resource IDs from the bridge ConfigMap:
    #   - bridgeData.data.vpc_id    → SecurityGroup.spec.vpcID
    #   - bridgeData.data.base_sg_id → userIDGroupPairs.groupID
    #
    # The userIDGroupPairs rule proves that a downstream SG can reference
    # an upstream SG by its real AWS ID obtained via the bridge pattern.
    # This is how gen3-kro modular tiers would give the Database SG
    # access from the EKS/Foundation SG without hardcoding IDs.
    #
    # Note: SecurityGroup must be in the SAME VPC as the source SG for
    # userIDGroupPairs rules — hence using bridgeData.data.vpc_id here.
    # ================================================================
    - id: consumerSg
      readyWhen:
        - ${consumerSg.status.?id.orValue('null') != 'null'}
        - ${consumerSg.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-consumer-sg
          namespace: ${targetNamespace.metadata.name}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
          labels:
            test-suite: kro-capabilities
            test-name: cross-rgd-consumer
            sg-role: consumer
        spec:
          name: ${schema.spec.name}-consumer-sg
          description: "Consumer SG — references producer SG via userIDGroupPairs"
          # VPC ID from real ACK status via bridge ConfigMap
          vpcID: ${bridgeData.data.vpc_id}
          ingressRules:
            # SG-to-SG rule using real ACK sg.status.id from the producer
            - ipProtocol: tcp
              fromPort: 5432
              toPort: 5432
              userIDGroupPairs:
                - groupID: ${bridgeData.data.base_sg_id}
                  description: "PostgreSQL from Foundation SG (cross-RGD reference)"
          tags:
            - key: Name
              value: ${schema.spec.name}-consumer-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ================================================================
    # Cross-RGD Summary — proof of the full data flow chain
    #
    # This ConfigMap serves as a "receipt":
    #   Producer ACK VPC/SG → bridge ConfigMap → externalRef → consumer SG
    # Asserting all fields are populated validates the complete chain.
    # ================================================================
    - id: crossRgdSummary
      readyWhen:
        - ${crossRgdSummary.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-crossrgd-summary
          namespace: ${targetNamespace.metadata.name}
          labels:
            test-suite: kro-capabilities
            test-name: cross-rgd-summary
        data:
          # Proves externalRef read real ACK IDs from producer namespace
          source_bridge: ${schema.spec.producerBridgeName}
          source_namespace: ${schema.spec.producerNamespace}
          consumed_vpc_id: ${bridgeData.data.vpc_id}
          consumed_producer_sg_id: ${bridgeData.data.base_sg_id}
          consumed_region: ${bridgeData.data.region}
          # Proves consumer SG was created using the consumed VPC ID
          consumer_sg_id: ${consumerSg.status.?id.orValue("loading")}
          # Full chain evidence
          data_flow: "Producer ACK SG (${bridgeData.data.base_sg_id}) in VPC (${bridgeData.data.vpc_id}) → bridge → consumer SG userIDGroupPairs"
          consumer_environment: ${schema.spec.environment}
