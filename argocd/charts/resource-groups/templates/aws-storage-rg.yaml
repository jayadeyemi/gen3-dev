# AWS Storage RGD — S3 + KMS + IAM (ACK → Real AWS)
#
# Manages the same ACK resource types used in gen3-kro's AwsGen3Infra1Flat,
# reduced to the three core storage services:
#   - s3.services.k8s.aws  — Bucket  (logging, data, upload)
#   - kms.services.k8s.aws — Key     (logging, platform)
#   - iam.services.k8s.aws — Role    (cluster, node)
#
# Dependency graph (mirrors gen3-kro's layer 1 → 2 ordering):
#   Layer 0: Namespace (for holding ACK resources)
#   Layer 1: KMS Keys (loggingKey, platformKey)  +  IAM Roles (clusterRole, nodeRole)
#   Layer 2: S3 Buckets (loggingBucket, dataBucket, uploadBucket) ← depends on Keys
#
# ACK controllers run in the Kind cluster and talk to REAL AWS APIs.
# Credentials: K8s Secret created from mounted ~/.aws/credentials (MFA assumed-role).

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: aws-storage-test
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3StorageTest
    spec:
      # Identity
      name: string | required=true
      namespace: string | default="gen3-dev-test"
      region: string | default="us-east-1"
      environment: string | default="local"
      project: string | default="gen3-dev"

      # ACK adoption/deletion behaviour (match gen3-kro defaults)
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # S3 bucket names
      loggingBucketName: string | required=true
      dataBucketName: string | required=true
      uploadBucketName: string | required=true

      # KMS key description prefix
      kmsKeyDescription: string | default="Gen3 local test encryption key"

      # IAM role flags (mirrors gen3-kro's pattern)
      clusterRoleEnabled: boolean | default=true
      nodeRoleEnabled: boolean | default=true

    status:
      # KMS key IDs
      loggingKeyID: ${loggingKey.status.?keyID.orValue("loading")}
      platformKeyID: ${platformKey.status.?keyID.orValue("loading")}

      # KMS key ARNs
      loggingKeyARN: ${loggingKey.status.?ackResourceMetadata.?arn.orValue("loading")}
      platformKeyARN: ${platformKey.status.?ackResourceMetadata.?arn.orValue("loading")}

      # S3 bucket ARNs
      loggingBucketARN: ${loggingBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
      dataBucketARN: ${dataBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
      uploadBucketARN: ${uploadBucket.status.?ackResourceMetadata.?arn.orValue("loading")}

      # IAM role ARNs
      clusterRoleARN: ${clusterRole.status.?ackResourceMetadata.?arn.orValue("loading")}
      nodeRoleARN: ${nodeRole.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
    # ================================================================
    # Layer 0: Namespace
    # ================================================================
    - id: targetNamespace
      readyWhen:
        - ${targetNamespace.status.phase == "Active"}
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            app.kubernetes.io/name: ${schema.spec.name}
            environment: ${schema.spec.environment}

    # ================================================================
    # Layer 1: KMS Keys  (no cross-dependencies)
    # ================================================================

    # ── Logging Key ────────────────────────────────────────────────
    - id: loggingKey
      readyWhen:
        - ${loggingKey.status.?keyID.orValue('null') != 'null'}
        - ${loggingKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-logging-key
          namespace: ${targetNamespace.metadata.name}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "${schema.spec.kmsKeyDescription} — logging/audit"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-logging-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: logging-audit

    # ── Platform Key ───────────────────────────────────────────────
    - id: platformKey
      readyWhen:
        - ${platformKey.status.?keyID.orValue('null') != 'null'}
        - ${platformKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-platform-key
          namespace: ${targetNamespace.metadata.name}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "${schema.spec.kmsKeyDescription} — platform services"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-platform-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: platform

    # ================================================================
    # Layer 1: IAM Roles  (no cross-dependencies)
    # ================================================================

    # ── EKS Cluster Role (simplified trust policy for local CSOC) ──────
    - id: clusterRole
      includeWhen:
        - ${schema.spec.clusterRoleEnabled == true}
      readyWhen:
        - ${clusterRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${clusterRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-eks-cluster-role
          namespace: ${targetNamespace.metadata.name}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-cluster-role
          description: IAM role for EKS cluster control plane (gen3-dev)
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "eks.amazonaws.com"},
                "Action": ["sts:AssumeRole", "sts:TagSession"]
              }]
            }
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-cluster-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── EKS Node Role ─────────────────────────────────────────────
    - id: nodeRole
      includeWhen:
        - ${schema.spec.nodeRoleEnabled == true}
      readyWhen:
        - ${nodeRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${nodeRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-eks-node-role
          namespace: ${targetNamespace.metadata.name}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-node-role
          description: IAM role for EKS worker nodes (gen3-dev)
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": ["ec2.amazonaws.com", "eks.amazonaws.com"]},
                "Action": "sts:AssumeRole"
              }]
            }
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-node-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ================================================================
    # Layer 2: S3 Buckets  (depend on KMS Keys for encryption)
    # ================================================================

    # ── Logging Bucket ─────────────────────────────────────────────
    - id: loggingBucket
      readyWhen:
        - ${loggingBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${loggingBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-logging-bucket
          namespace: ${targetNamespace.metadata.name}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.loggingBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${loggingKey.status.?ackResourceMetadata.?arn}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.loggingBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: logging

    # ── Data Bucket ────────────────────────────────────────────────
    - id: dataBucket
      readyWhen:
        - ${dataBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dataBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-data-bucket
          namespace: ${targetNamespace.metadata.name}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.dataBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${platformKey.status.?ackResourceMetadata.?arn}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.dataBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: data

    # ── Upload Bucket ──────────────────────────────────────────────
    - id: uploadBucket
      readyWhen:
        - ${uploadBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${uploadBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-upload-bucket
          namespace: ${targetNamespace.metadata.name}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.uploadBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${platformKey.status.?ackResourceMetadata.?arn}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.uploadBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: upload
