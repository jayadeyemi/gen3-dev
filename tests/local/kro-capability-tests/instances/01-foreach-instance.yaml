# forEach Test Instance
#
# Tests:
#   - 3 ConfigMaps from values array ["alpha", "beta", "gamma"]
#   - Cartesian product disabled (only single-dimension)
#
# Expected results:
#   - Namespace kro-test-foreach created
#   - 3 ConfigMaps: foreach-test-single-alpha, -beta, -gamma
#   - No cartesian ConfigMaps (cartesianEnabled=false)

apiVersion: v1alpha1
kind: KroForEachTest
metadata:
  name: foreach-test
  namespace: default
spec:
  name: foreach-test
  namespace: kro-test-foreach
  environment: test
  values:
    - alpha
    - beta
    - gamma
  cartesianEnabled: false
---
# forEach Test Instance — with Cartesian Product
#
# Tests:
#   - 3 ConfigMaps from values array
#   - 4 Cartesian ConfigMaps from regions × tiers (2×2)
#
# Expected results:
#   - 3 single ConfigMaps + 4 cartesian ConfigMaps = 7 total

apiVersion: v1alpha1
kind: KroForEachTest
metadata:
  name: foreach-cartesian-test
  namespace: default
spec:
  name: foreach-cart
  namespace: kro-test-foreach-cart
  environment: test
  values:
    - one
    - two
    - three
  regions:
    - us-east-1
    - eu-west-1
  tiers:
    - web
    - api
  cartesianEnabled: true
