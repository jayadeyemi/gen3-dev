  # search KMS/SGs. Feature flags control prep resource groups.
  # Creates up to 4 bridge ConfigMaps (foundation + 3 conditional prep).
  # Uses 10.1.0.0/16 CIDR.
  # RGD: awsgen3foundation2-rg.yaml

