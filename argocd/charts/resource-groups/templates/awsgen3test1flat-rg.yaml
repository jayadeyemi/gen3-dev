# AwsGen3Test1Flat — Test Graph (All Low-Cost Components, v1)
#
# Contains all low-cost components from AwsGen3Infra1Flat to validate
# the full KRO→ACK→AWS pattern without expensive compute or database.
#
# INCLUDED (~$37/month):
#   Networking: VPC, IGW, EIP, NAT, 3 route tables, 6 subnets
#   Security:   4 KMS keys (with IAM key policies), 2 security groups,
#               2 IAM roles (cluster + node)
#   Storage:    3 S3 buckets (KMS-encrypted)
#   Database:   DB subnet group (no Aurora cluster)
#   Outputs:    Infrastructure outputs K8s Secret
#
# EXCLUDED (expensive):
#   EKS cluster (~$72/month), Aurora cluster/instances (~$30+/month),
#   ArgoCD cluster secret (EKS-dependent), pod identity (EKS-dependent),
#   ArgoCD spoke role (cross-account), fence config (Aurora-dependent)

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3test1flat
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Test1Flat
    spec:
      # Basic metadata
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ==================== Security Configuration ====================
      kmsKeyDescription: string | default="Gen3 encryption key"
      kmsKeyAlias: string | default="gen3-key"

      # ==================== Network Configuration ====================
      vpcCIDR: string | required=true
      publicSubnetCIDRs: "[]string | required=true"
      privateSubnetCIDRs: "[]string | required=true"
      dbSubnetCIDRs: "[]string | required=true"
      availabilityZones: "[]string | required=true"

      # ==================== Data Configuration ====================
      loggingBucketName: string
      dataBucketName: string
      uploadBucketName: string

    status:
      # Security Status (KMS)
      loggingKeyARN: ${loggingKey.status.?ackResourceMetadata.?arn.orValue("loading")}
      databaseKeyARN: ${databaseKey.status.?ackResourceMetadata.?arn.orValue("loading")}
      searchKeyARN: ${searchKey.status.?ackResourceMetadata.?arn.orValue("loading")}
      platformKeyARN: ${platformKey.status.?ackResourceMetadata.?arn.orValue("loading")}

      # Network Status
      vpcID: ${vpc.status.?vpcID.orValue("loading")}
      internetGatewayID: ${igw.status.?internetGatewayID.orValue("loading")}
      publicSubnetIDs:
        - ${publicsubnet1.status.?subnetID.orValue("loading")}
        - ${publicsubnet2.status.?subnetID.orValue("loading")}
      privateSubnetIDs:
        - ${privatesubnet1.status.?subnetID.orValue("loading")}
        - ${privatesubnet2.status.?subnetID.orValue("loading")}
      dbSubnetIDs:
        - ${dbsubnet1.status.?subnetID.orValue("loading")}
        - ${dbsubnet2.status.?subnetID.orValue("loading")}
      natGatewayIDs:
        - ${natGateway1.status.?natGatewayID.orValue("loading")}
      elasticIPAllocationIDs:
        - ${eip1.status.?allocationID.orValue("loading")}
      routeTableIDs:
        public: ${publicRouteTable.status.?routeTableID.orValue("loading")}
        private: ${privateRouteTable.status.?routeTableID.orValue("loading")}
        database: ${dbRouteTable.status.?routeTableID.orValue("loading")}

      # Storage Status (S3)
      loggingBucketARN: ${loggingBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
      dataBucketARN: ${dataBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
      uploadBucketARN: ${uploadBucket.status.?ackResourceMetadata.?arn.orValue("loading")}

      # Security Groups Status
      eksSecurityGroupID: ${eksSecurityGroup.status.?id.orValue("loading")}
      auroraSecurityGroupID: ${auroraSecurityGroup.status.?id.orValue("loading")}

      # IAM Roles Status
      clusterRoleARN: ${clusterRole.status.?ackResourceMetadata.?arn.orValue("loading")}
      nodeRoleARN: ${nodeRole.status.?ackResourceMetadata.?arn.orValue("loading")}

      # Database Infrastructure Status
      dbSubnetGroupARN: ${dbSubnetGroup.status.?ackResourceMetadata.?arn.orValue("loading")}

      # Infrastructure Outputs
      infraOutputsSecretName: ${infraOutputsSecret.metadata.?name.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: Namespace References
  # ====================================================================
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}
  # ====================================================================
  # NETWORKING: VPC, Subnets, Gateways, Route Tables
  # ====================================================================
    # Layer 1: VPC
    - id: vpc
      readyWhen:
        - ${vpc.status.?vpcID.orValue('null') != 'null'}
        - ${vpc.status.?state.orValue('null') == 'available'}
        - ${vpc.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: VPC
        metadata:
          name: ${schema.spec.name}-vpc
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          cidrBlocks:
            - ${schema.spec.vpcCIDR}
          enableDNSHostnames: true
          enableDNSSupport: true
          tags:
            - key: Name
              value: ${schema.spec.name}-vpc
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 1: Elastic IP
    - id: eip1
      readyWhen:
        - ${eip1.status.?allocationID.orValue('null') != 'null'}
        - ${eip1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: ElasticIPAddress
        metadata:
          name: ${schema.spec.name}-eip-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          tags:
            - key: Name
              value: ${schema.spec.name}-eip-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 2: Internet Gateway
    - id: igw
      readyWhen:
        - ${igw.status.?internetGatewayID.orValue('null') != 'null'}
        - ${igw.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${igw.status.?attachments.orValue([]).exists(a, a.state == "available")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: InternetGateway
        metadata:
          name: ${schema.spec.name}-igw
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-igw
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 3: Public Route Table
    - id: publicRouteTable
      readyWhen:
        - ${publicRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${publicRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-public-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              gatewayID: ${igw.status.?internetGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-rt
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 4: Public Subnet 1
    - id: publicsubnet1
      readyWhen:
        - ${publicsubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${publicsubnet1.status.?state.orValue('null') == 'available'}
        - ${publicsubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-public-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.publicSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: true
          routeTableRefs:
            - from:
                name: ${publicRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"
    # Layer 4: Public Subnet 2
    - id: publicsubnet2
      readyWhen:
        - ${publicsubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${publicsubnet2.status.?state.orValue('null') == 'available'}
        - ${publicsubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-public-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.publicSubnetCIDRs[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: true
          routeTableRefs:
            - from:
                name: ${publicRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-subnet-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"
    # Layer 5: NAT Gateway
    - id: natGateway1
      readyWhen:
        - ${natGateway1.status.?natGatewayID.orValue('null') != 'null'}
        - ${natGateway1.status.?state.orValue('null') == 'available'}
        - ${natGateway1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: NATGateway
        metadata:
          name: ${schema.spec.name}-nat-gw-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          allocationID: ${eip1.status.?allocationID}
          subnetID: ${publicsubnet1.status.?subnetID}
          tags:
            - key: Name
              value: ${schema.spec.name}-nat-gw-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 6: Private Route Table
    - id: privateRouteTable
      readyWhen:
        - ${privateRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${privateRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-private-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              natGatewayID: ${natGateway1.status.?natGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-private-rt
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 6: DB Route Table
    - id: dbRouteTable
      readyWhen:
        - ${dbRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${dbRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-db-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              natGatewayID: ${natGateway1.status.?natGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-rt
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 7: Private Subnet 1
    - id: privatesubnet1
      readyWhen:
        - ${privatesubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${privatesubnet1.status.?state.orValue('null') == 'available'}
        - ${privatesubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-private-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.privateSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${privateRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-private-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/internal-elb
              value: "1"
            - key: kubernetes.io/cluster/${schema.spec.name}
              value: owned
    # Layer 7: Private Subnet 2
    - id: privatesubnet2
      readyWhen:
        - ${privatesubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${privatesubnet2.status.?state.orValue('null') == 'available'}
        - ${privatesubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-private-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.privateSubnetCIDRs[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${privateRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-private-subnet-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/internal-elb
              value: "1"
            - key: kubernetes.io/cluster/${schema.spec.name}
              value: owned
    # Layer 7: DB Subnet 1
    - id: dbsubnet1
      readyWhen:
        - ${dbsubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${dbsubnet1.status.?state.orValue('null') == 'available'}
        - ${dbsubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-db-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.dbSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${dbRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Type
              value: Database
    # Layer 7: DB Subnet 2
    - id: dbsubnet2
      readyWhen:
        - ${dbsubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${dbsubnet2.status.?state.orValue('null') == 'available'}
        - ${dbsubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-db-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${schema.spec.dbSubnetCIDRs[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${dbRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Type
              value: Database
  # ====================================================================
  # STORAGE: S3 Buckets
  # ====================================================================
    # Logging S3 Bucket
    - id: loggingBucket
      readyWhen:
        - ${loggingBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${loggingBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-logging-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.loggingBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${loggingKey.status.?ackResourceMetadata.?arn}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.loggingBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: logging
    # Data S3 Bucket
    - id: dataBucket
      readyWhen:
        - ${dataBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dataBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-data-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.dataBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${platformKey.status.?ackResourceMetadata.?arn}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.dataBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: data
    # Upload S3 Bucket
    - id: uploadBucket
      readyWhen:
        - ${uploadBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${uploadBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-upload-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.uploadBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${platformKey.status.?ackResourceMetadata.?arn}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.uploadBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: upload
  # ====================================================================
  # SECURITY: KMS Keys, IAM Roles, Security Groups
  # ====================================================================
    # Logging Key
    - id: loggingKey
      readyWhen:
        - ${loggingKey.status.?keyID.orValue('null') != 'null'}
        - ${loggingKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${loggingKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-logging-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for logging and audit data (CloudTrail, VPC Flow Logs, security logs)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-logging-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: logging-audit
    # Database Key (with RDS IAM policy)
    - id: databaseKey
      readyWhen:
        - ${databaseKey.status.?keyID.orValue('null') != 'null'}
        - ${databaseKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${databaseKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-database-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for database encryption (Aurora, RDS)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow RDS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "rds.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-database-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: database
    # Search/Index Key (with ElastiCache + OpenSearch IAM policies)
    - id: searchKey
      readyWhen:
        - ${searchKey.status.?keyID.orValue('null') != 'null'}
        - ${searchKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${searchKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-search-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for search and indexing services (OpenSearch, ElastiCache)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow ElastiCache to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "elasticache.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                },
                {
                  "Sid": "Allow OpenSearch to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "es.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-search-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: search-index
    # Platform/Cluster Key (with EKS IAM policy)
    - id: platformKey
      readyWhen:
        - ${platformKey.status.?keyID.orValue('null') != 'null'}
        - ${platformKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${platformKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-platform-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for platform services (EKS secrets, S3 app buckets, EFS)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow EKS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "eks.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-platform-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: platform
    # EKS Security Group
    - id: eksSecurityGroup
      readyWhen:
        - ${eksSecurityGroup.status.?id.orValue('null') != 'null'}
        - ${eksSecurityGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-eks-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-sg
          description: Security group for EKS cluster and worker nodes
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 443
              toPort: 443
              ipRanges:
                - cidrIP: ${schema.spec.vpcCIDR}
                  description: Allow control plane communication
            - ipProtocol: tcp
              fromPort: 10250
              toPort: 10250
              ipRanges:
                - cidrIP: ${schema.spec.vpcCIDR}
                  description: Allow kubelet API
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Aurora Security Group
    - id: auroraSecurityGroup
      readyWhen:
        - ${auroraSecurityGroup.status.?id.orValue('null') != 'null'}
        - ${auroraSecurityGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-aurora-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aurora-sg
          description: Security group for Aurora PostgreSQL
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 5432
              toPort: 5432
              userIDGroupPairs:
                - groupID: ${eksSecurityGroup.status.?id}
                  description: Allow EKS nodes access to Aurora PostgreSQL
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # EKS Cluster IAM Role
    - id: clusterRole
      readyWhen:
        - ${clusterRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${clusterRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-eks-cluster-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-cluster-role
          description: IAM role for EKS cluster control plane
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "eks.amazonaws.com"},
                "Action": ["sts:AssumeRole", "sts:TagSession"]
              }]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
            - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
            - arn:aws:iam::aws:policy/AmazonEKSComputePolicy
            - arn:aws:iam::aws:policy/AmazonEKSBlockStoragePolicy
            - arn:aws:iam::aws:policy/AmazonEKSLoadBalancingPolicy
            - arn:aws:iam::aws:policy/AmazonEKSNetworkingPolicy
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-cluster-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # EKS Node IAM Role
    - id: nodeRole
      readyWhen:
        - ${nodeRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${nodeRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-eks-node-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-node-role
          description: IAM role for EKS worker nodes
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": ["ec2.amazonaws.com", "eks.amazonaws.com"]},
                "Action": "sts:AssumeRole"
              }]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
            - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
            - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
            - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPullOnly
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-node-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
  # ====================================================================
  # DATABASE INFRASTRUCTURE: DB Subnet Group (no Aurora cluster)
  # ====================================================================
    - id: dbSubnetGroup
      readyWhen:
        - ${dbSubnetGroup.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dbSubnetGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBSubnetGroup
        metadata:
          name: ${schema.spec.name}-subnet-group
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-subnet-group
          description: Subnet group for ${schema.spec.name} Aurora cluster
          subnetIDs:
            - ${dbsubnet1.status.?subnetID}
            - ${dbsubnet2.status.?subnetID}
          tags:
            - key: Name
              value: ${schema.spec.name}-subnet-group
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
  # ====================================================================
  # OUTPUTS: Infrastructure Outputs Secret
  # ====================================================================
    - id: infraOutputsSecret
      readyWhen:
        - ${infraOutputsSecret.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-infra-outputs
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
        type: Opaque
        stringData:
          # Network Outputs
          vpc-id: ${vpc.status.?vpcID}
          igw-id: ${igw.status.?internetGatewayID}
          nat-gateway-id: ${natGateway1.status.?natGatewayID}
          eip-allocation-id: ${eip1.status.?allocationID}
          public-subnet-1-id: ${publicsubnet1.status.?subnetID}
          public-subnet-2-id: ${publicsubnet2.status.?subnetID}
          private-subnet-1-id: ${privatesubnet1.status.?subnetID}
          private-subnet-2-id: ${privatesubnet2.status.?subnetID}
          db-subnet-1-id: ${dbsubnet1.status.?subnetID}
          db-subnet-2-id: ${dbsubnet2.status.?subnetID}
          public-route-table-id: ${publicRouteTable.status.?routeTableID}
          private-route-table-id: ${privateRouteTable.status.?routeTableID}
          db-route-table-id: ${dbRouteTable.status.?routeTableID}
          # Security Outputs
          logging-key-arn: ${loggingKey.status.?ackResourceMetadata.?arn}
          database-key-arn: ${databaseKey.status.?ackResourceMetadata.?arn}
          search-key-arn: ${searchKey.status.?ackResourceMetadata.?arn}
          platform-key-arn: ${platformKey.status.?ackResourceMetadata.?arn}
          eks-sg-id: ${eksSecurityGroup.status.?id}
          aurora-sg-id: ${auroraSecurityGroup.status.?id}
          cluster-role-arn: ${clusterRole.status.?ackResourceMetadata.?arn}
          node-role-arn: ${nodeRole.status.?ackResourceMetadata.?arn}
          # Storage Outputs
          logging-bucket-arn: ${loggingBucket.status.?ackResourceMetadata.?arn}
          data-bucket-arn: ${dataBucket.status.?ackResourceMetadata.?arn}
          upload-bucket-arn: ${uploadBucket.status.?ackResourceMetadata.?arn}
          # Database Infrastructure Outputs
          db-subnet-group-arn: ${dbSubnetGroup.status.?ackResourceMetadata.?arn}
