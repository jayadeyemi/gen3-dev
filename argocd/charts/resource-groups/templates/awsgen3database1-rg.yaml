# AwsGen3Database1 — Tier 1: Database (Modular RGD v1)
#
# Aurora PostgreSQL Serverless v2 + supporting networking and encryption.
# Per Plan 02, this tier depends on Foundation (Tier 0) outputs.
#
# INCLUDED (9 resources + 1 conditional bridge):
#   Networking: 2 DB subnets, 1 DB route table (routes to NAT)
#   Storage:    1 DB subnet group
#   Security:   1 PostgreSQL security group (port 5432)
#   Encryption: 1 KMS key (RDS-specific policy)
#   Database:   1 Aurora PostgreSQL cluster + 1 writer instance
#   Bridge:     1 optional ConfigMap with all outputs (for downstream tiers)
#
# PREREQUISITES:
#   1. Foundation tier deployed with createBridgeSecret=true
#   2. K8s Secret containing Aurora master password must exist in the
#      Database namespace BEFORE deploying this tier.
#      Example:
#        kubectl create secret generic aurora-master-password \
#          -n gen3-database --from-literal=password='<your-password>'
#
# CROSS-TIER: Reads Foundation bridge ConfigMap via externalRef
# (cross-namespace read validated by KRO capability Test 7b).

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3database1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Database1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ── Foundation Bridge Reference ──────────────────────────────
      foundationBridgeName: string | required=true
      foundationNamespace: string | required=true

      # ── Database Networking ──────────────────────────────────────
      dbSubnetCIDRs: "[]string | required=true"
      availabilityZones: "[]string | required=true"

      # ── Aurora Configuration ─────────────────────────────────────
      auroraEngineVersion: string | default="16.6"
      auroraDBName: string | default="gen3"
      auroraMasterUsername: string | default="postgres"
      masterPasswordSecretName: string | required=true
      masterPasswordSecretKey: string | default="password"
      auroraMinCapacity: string | default="0.5"
      auroraMaxCapacity: string | default="4"

      # ── Bridge ───────────────────────────────────────────────────
      createBridgeSecret: boolean | default=true

    status:
      # Networking
      dbSubnetIDs:
        - ${dbSubnet1.status.?subnetID.orValue("loading")}
        - ${dbSubnet2.status.?subnetID.orValue("loading")}
      dbRouteTableID: ${dbRouteTable.status.?routeTableID.orValue("loading")}
      dbSecurityGroupID: ${dbSecurityGroup.status.?id.orValue("loading")}

      # Encryption
      databaseKeyARN: ${databaseKey.status.?ackResourceMetadata.?arn.orValue("loading")}

      # Aurora
      auroraClusterEndpoint: ${auroraCluster.status.?endpoint.orValue("loading")}
      auroraReaderEndpoint: ${auroraCluster.status.?readerEndpoint.orValue("loading")}
      auroraClusterARN: ${auroraCluster.status.?ackResourceMetadata.?arn.orValue("loading")}
      auroraInstanceARN: ${auroraInstance1.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References
  # ====================================================================

    # ── Namespace (for account ID in KMS policy) ─────────────────────
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    # ── Foundation Bridge ConfigMap (cross-namespace) ────────────────
    - id: foundationBridge
      readyWhen:
        - ${foundationBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.foundationBridgeName}
          namespace: ${schema.spec.foundationNamespace}

  # ====================================================================
  # NETWORKING: DB Subnets + Route Table
  # ====================================================================

    # ── DB Route Table (routes to NAT from Foundation) ───────────────
    - id: dbRouteTable
      readyWhen:
        - ${dbRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${dbRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-db-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${foundationBridge.data['vpc-id']}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              natGatewayID: ${foundationBridge.data['nat-gateway-id']}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-rt
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── DB Subnet 1 ──────────────────────────────────────────────────
    - id: dbSubnet1
      readyWhen:
        - ${dbSubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${dbSubnet1.status.?state.orValue('null') == 'available'}
        - ${dbSubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-db-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${foundationBridge.data['vpc-id']}
          cidrBlock: ${schema.spec.dbSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${dbRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Tier
              value: database

    # ── DB Subnet 2 ──────────────────────────────────────────────────
    - id: dbSubnet2
      readyWhen:
        - ${dbSubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${dbSubnet2.status.?state.orValue('null') == 'available'}
        - ${dbSubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-db-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${foundationBridge.data['vpc-id']}
          cidrBlock: ${schema.spec.dbSubnetCIDRs[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${dbRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Tier
              value: database

    # ── DB Subnet Group ──────────────────────────────────────────────
    - id: dbSubnetGroup
      readyWhen:
        - ${dbSubnetGroup.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dbSubnetGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBSubnetGroup
        metadata:
          name: ${schema.spec.name}-db-subnet-group
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-db-subnet-group
          description: "DB subnet group for ${schema.spec.name}"
          subnetIDs:
            - ${dbSubnet1.status.?subnetID}
            - ${dbSubnet2.status.?subnetID}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-group
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # SECURITY: Database Security Group
  # ====================================================================

    # ── PostgreSQL SG (port 5432 from VPC CIDR) ─────────────────────
    - id: dbSecurityGroup
      readyWhen:
        - ${dbSecurityGroup.status.?id.orValue('null') != 'null'}
        - ${dbSecurityGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-db-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-db-sg
          description: "PostgreSQL access for ${schema.spec.name}"
          vpcID: ${foundationBridge.data['vpc-id']}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 5432
              toPort: 5432
              ipRanges:
                - cidrIP: ${foundationBridge.data['vpc-cidr']}
                  description: "PostgreSQL from VPC"
          tags:
            - key: Name
              value: ${schema.spec.name}-db-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # ENCRYPTION: Database KMS Key
  # ====================================================================

    # ── Database Key (RDS-specific service policy) ───────────────────
    - id: databaseKey
      readyWhen:
        - ${databaseKey.status.?keyID.orValue('null') != 'null'}
        - ${databaseKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${databaseKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-database-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for Aurora PostgreSQL encryption (${schema.spec.name})"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow RDS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "rds.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey",
                    "kms:ReEncryptFrom",
                    "kms:ReEncryptTo"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-database-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: database

  # ====================================================================
  # DATABASE: Aurora PostgreSQL Serverless v2
  # ====================================================================

    # ── Aurora Cluster ───────────────────────────────────────────────
    - id: auroraCluster
      readyWhen:
        - ${auroraCluster.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraCluster.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraCluster.status.?status.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBCluster
        metadata:
          name: ${schema.spec.name}-aurora
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbClusterIdentifier: ${schema.spec.name}-aurora
          engine: aurora-postgresql
          engineVersion: ${schema.spec.auroraEngineVersion}
          databaseName: ${schema.spec.auroraDBName}
          port: 5432
          masterUsername: ${schema.spec.auroraMasterUsername}
          masterUserPassword:
            name: ${schema.spec.masterPasswordSecretName}
            key: ${schema.spec.masterPasswordSecretKey}
          dbSubnetGroupName: ${dbSubnetGroup.spec.name}
          vpcSecurityGroupIDs:
            - ${dbSecurityGroup.status.?id}
          storageEncrypted: true
          kmsKeyID: ${databaseKey.status.?ackResourceMetadata.?arn}
          serverlessV2ScalingConfiguration:
            minCapacity: ${schema.spec.auroraMinCapacity}
            maxCapacity: ${schema.spec.auroraMaxCapacity}
          backupRetentionPeriod: 7
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Aurora Writer Instance ───────────────────────────────────────
    - id: auroraInstance1
      readyWhen:
        - ${auroraInstance1.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraInstance1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraInstance1.status.?dbInstanceStatus.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBInstance
        metadata:
          name: ${schema.spec.name}-aurora-instance-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbInstanceIdentifier: ${schema.spec.name}-aurora-instance-1
          dbClusterIdentifier: ${auroraCluster.spec.dbClusterIdentifier}
          dbInstanceClass: db.serverless
          engine: aurora-postgresql
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-instance-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # BRIDGE: Database Outputs ConfigMap (for downstream tiers)
  # ====================================================================

    - id: databaseBridge
      includeWhen:
        - ${schema.spec.createBridgeSecret == true}
      readyWhen:
        - ${databaseBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-database-bridge
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
            gen3.io/bridge: "true"
        data:
          db-subnet-1-id: ${dbSubnet1.status.?subnetID}
          db-subnet-2-id: ${dbSubnet2.status.?subnetID}
          db-route-table-id: ${dbRouteTable.status.?routeTableID}
          db-subnet-group-name: ${dbSubnetGroup.spec.name}
          db-security-group-id: ${dbSecurityGroup.status.?id}
          database-key-arn: ${databaseKey.status.?ackResourceMetadata.?arn}
          aurora-cluster-endpoint: ${auroraCluster.status.?endpoint}
          aurora-reader-endpoint: ${auroraCluster.status.?readerEndpoint}
          aurora-cluster-arn: ${auroraCluster.status.?ackResourceMetadata.?arn}
          aurora-port: "5432"
