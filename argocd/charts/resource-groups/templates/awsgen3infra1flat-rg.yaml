  # ==================================================================
  # SECURITY: KMS Keys, IAM Roles/Policies, Security Groups
  # ==================================================================
    # Layer 1: Logging Key
    - id: loggingKey
      readyWhen:
        - ${loggingKey.status.?keyID.orValue('null') != 'null'}
        - ${loggingKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${loggingKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-logging-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for logging and audit data (CloudTrail, VPC Flow Logs, security logs)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-logging-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: logging-audit
    # Layer 1: Database Key
    - id: databaseKey
      readyWhen:
        - ${databaseKey.status.?keyID.orValue('null') != 'null'}
        - ${databaseKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${databaseKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-database-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for database encryption (Aurora, RDS)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow RDS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "rds.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-database-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: database
    # Layer 1: Search/Index Key
    - id: searchKey
      readyWhen:
        - ${searchKey.status.?keyID.orValue('null') != 'null'}
        - ${searchKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${searchKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-search-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for search and indexing services (OpenSearch, ElastiCache)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow ElastiCache to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "elasticache.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                },
                {
                  "Sid": "Allow OpenSearch to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "es.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-search-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: search-index
    # Layer 1: Platform/Cluster Key
    - id: platformKey
      readyWhen:
        - ${platformKey.status.?keyID.orValue('null') != 'null'}
        - ${platformKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${platformKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-platform-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for platform services (EKS secrets, S3 app buckets, EFS)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow EKS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "eks.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-platform-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: platform
    # Layer 1: EKS Security Group
    - id: eksSecurityGroup
      readyWhen:
        - ${eksSecurityGroup.status.?id.orValue('null') != 'null'}
        - ${eksSecurityGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-eks-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-sg
          description: Security group for EKS cluster and worker nodes
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            # Allow EKS control plane to communicate with nodes
            - ipProtocol: tcp
              fromPort: 443
              toPort: 443
              ipRanges:
                - cidrIP: ${schema.spec.vpcCIDR}
                  description: Allow control plane communication
            # Allow kubelet API
            - ipProtocol: tcp
              fromPort: 10250
              toPort: 10250
              ipRanges:
                - cidrIP: ${schema.spec.vpcCIDR}
                  description: Allow kubelet API
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 1: Aurora Security Group
    - id: auroraSecurityGroup
      readyWhen:
        - ${auroraSecurityGroup.status.?id.orValue('null') != 'null'}
        - ${auroraSecurityGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-aurora-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aurora-sg
          description: Security group for Aurora PostgreSQL
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            # Allow access from EKS nodes for application access
            - ipProtocol: tcp
              fromPort: 5432
              toPort: 5432
              userIDGroupPairs:
                - groupID: ${eksSecurityGroup.status.?id}
                  description: Allow EKS nodes access to Aurora PostgreSQL
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 1: EKS Cluster IAM Role
    - id: clusterRole
      readyWhen:
        - ${clusterRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${clusterRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-eks-cluster-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-cluster-role
          description: IAM role for EKS cluster control plane
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "eks.amazonaws.com"},
                "Action": ["sts:AssumeRole", "sts:TagSession"]
              }]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
            - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
            - arn:aws:iam::aws:policy/AmazonEKSComputePolicy
            - arn:aws:iam::aws:policy/AmazonEKSBlockStoragePolicy
            - arn:aws:iam::aws:policy/AmazonEKSLoadBalancingPolicy
            - arn:aws:iam::aws:policy/AmazonEKSNetworkingPolicy
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-cluster-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 1: EKS Node IAM Role
    - id: nodeRole
      readyWhen:
        - ${nodeRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${nodeRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-eks-node-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-node-role
          description: IAM role for EKS worker nodes
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": ["ec2.amazonaws.com", "eks.amazonaws.com"]},
                "Action": "sts:AssumeRole"
              }]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
            - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
            - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
            - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPullOnly
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-node-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Layer 1: ArgoCD Spoke IAM Role
    # Used by argocd-k8s-auth on the CSOC ArgoCD controller to authenticate
    # to the spoke EKS cluster via STS AssumeRole + EKS GetToken.
    # Trust policy:
    #   - pods.eks.amazonaws.com  — enables EKS Pod Identity (spoke-side)
    #   - *-argocd-role in CSOC   — enables STS AssumeRole from CSOC ArgoCD
    # The matching EKS AccessEntry (below) grants this role cluster admin.
    - id: argoCDSpokeRole
      readyWhen:
        - ${argoCDSpokeRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${argoCDSpokeRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.namespace}-argocd-spoke-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.namespace}-argocd-spoke-role
          description: IAM role for ArgoCD application-controller on spoke ${schema.spec.namespace}
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Service": "pods.eks.amazonaws.com"},
                  "Action": ["sts:AssumeRole", "sts:TagSession"]
                },
                {
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${argocdNamespace.metadata.annotations['csoc-account-id']}:root"},
                  "Action": "sts:AssumeRole",
                  "Condition": {
                    "ArnLike": {
                      "aws:PrincipalArn": "arn:aws:iam::${argocdNamespace.metadata.annotations['csoc-account-id']}:role/*-argocd-role"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            ArgoCDSpokePolicy: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Sid": "ArgoCDSecretsAccess",
                    "Effect": "Allow",
                    "Action": ["secretsmanager:GetSecretValue", "secretsmanager:DescribeSecret"],
                    "Resource": "*",
                    "Condition": {"StringLike": {"secretsmanager:SecretId": ["argocd/*", "argo-cd/*", "${schema.spec.name}-*"]}}
                  },
                  {
                    "Sid": "ArgoCDParameterStoreAccess",
                    "Effect": "Allow",
                    "Action": ["ssm:GetParameter", "ssm:GetParameters", "ssm:GetParametersByPath"],
                    "Resource": "*",
                    "Condition": {"StringLike": {"ssm:path": ["/argocd/*", "/argo-cd/*"]}}
                  },
                  {
                    "Sid": "EKSReadAccess",
                    "Effect": "Allow",
                    "Action": ["eks:DescribeCluster", "eks:ListClusters"],
                    "Resource": "*"
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.namespace}-argocd-spoke-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
  # ====================================================================
  # COMPUTE: EKS
  # ====================================================================
    # EKS Cluster
    - id: eksCluster
      readyWhen:
        - ${eksCluster.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${eksCluster.status.?status.orValue('null') == 'ACTIVE'}
        - ${eksCluster.status.?endpoint.orValue('null') != 'null'}
        - ${eksCluster.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Cluster
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}
          version: ${schema.spec.eksVersion}
          roleARN: ${clusterRole.status.?ackResourceMetadata.?arn}
          resourcesVPCConfig:
            subnetIDs:
              - ${privatesubnet1.status.?subnetID}
              - ${privatesubnet2.status.?subnetID}
            securityGroupIDs:
              - ${eksSecurityGroup.status.?id}
            endpointPrivateAccess: true
            endpointPublicAccess: true
          computeConfig:
            enabled: true
            nodeRoleARN: ${nodeRole.status.?ackResourceMetadata.?arn}
            nodePools:
              - system
              - general-purpose
          encryptionConfig:
            - resources:
                - secrets
              provider:
                keyARN: ${platformKey.status.?ackResourceMetadata.?arn}
          kubernetesNetworkConfig:
            ipFamily: ipv4
            elasticLoadBalancing:
              enabled: true
          storageConfig:
            blockStorage:
              enabled: true
          accessConfig:
            authenticationMode: "API"
            bootstrapClusterCreatorAdminPermissions: true
          logging:
            clusterLogging:
              - types:
                  - api
                  - audit
                  - authenticator
                  - controllerManager
                  - scheduler
                enabled: true
          tags:
            Name: ${schema.spec.name}
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}
    # EKS Access Entry for ArgoCD
    - id: eksAccessEntry
      readyWhen:
        - ${eksAccessEntry.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${eksAccessEntry.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: AccessEntry
        metadata:
          name: ${schema.spec.name}-argocd-access
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          clusterName: ${eksCluster.metadata.name}
          principalARN: ${argoCDSpokeRole.status.?ackResourceMetadata.?arn}
          type: STANDARD
          accessPolicies:
            - policyARN: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
              accessScope:
                type: cluster
          tags:
            Name: ${schema.spec.name}-argocd-access
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}
    # Pod Identity Association for ArgoCD
    - id: podIdentityAssociation
      readyWhen:
        - ${podIdentityAssociation.status.?associationID.orValue('null') != 'null'}
        - ${podIdentityAssociation.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: PodIdentityAssociation
        metadata:
          name: ${schema.spec.name}-argocd-pod-identity
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          clusterName: ${eksCluster.metadata.name}
          namespace: argocd
          serviceAccount: argocd-application-controller
          roleARN: ${argoCDSpokeRole.status.?ackResourceMetadata.?arn}
          tags:
            Name: ${schema.spec.name}-argocd-pod-identity
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}

    # ArgoCD Cluster Secret
    # Labels and annotations on this secret are exposed by the ArgoCD cluster
    # generator as template parameters. The fleet-gen3 ApplicationSet reads
    # infra output annotations (gen3.io/*) to inject dynamic values (Aurora
    # endpoint, VPC ID, etc.) into Helm parameters — no plugins required.
    #
    # NAMING: The secret metadata.name uses <namespace>-cluster (e.g.
    # spoke1-cluster) while data.name uses the INSTANCE name (e.g. spoke1-dev)
    # to avoid collision with the Terraform-managed <namespace>-fleet secret
    # whose data.name is the spoke alias (e.g. spoke1).  The spoke alias is
    # preserved in the gen3.io/spoke-alias annotation for ApplicationSet naming.
    - id: argoCDClusterSecret
      readyWhen:
        - ${argoCDClusterSecret.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.spec.namespace}-cluster
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            argocd.argoproj.io/secret-type: cluster
            # Selectors for fleet-cluster-resources and fleet-gen3 ApplicationSets
            fleet_member: spoke
            environment: ${schema.spec.environment}
          annotations:
            # ── Dependency: Wait for EKS + Aurora (KRO sequencing) ──
            kro.run/eks-endpoint: ${eksCluster.status.?endpoint}
            kro.run/aurora-endpoint: ${auroraCluster.status.?endpoint}
            services.k8s.aws/owner-account-id: ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}
            # ── Infra outputs exposed to fleet-gen3 ApplicationSet ──
            # Non-sensitive metadata only; passwords stay in infraOutputsSecret
            # and are consumed on the spoke cluster via ExternalSecrets.
            gen3.io/spoke-alias: ${schema.spec.namespace}
            gen3.io/infra-name: ${schema.spec.name}
            gen3.io/aurora-endpoint: ${auroraCluster.status.?endpoint}
            gen3.io/aurora-reader-endpoint: ${auroraCluster.status.?readerEndpoint}
            gen3.io/aurora-master-username: ${schema.spec.auroraMasterUsername}
            gen3.io/aurora-database-name: ${schema.spec.auroraDatabaseName}
            gen3.io/vpc-id: ${vpc.status.?vpcID}
            gen3.io/eks-cluster-name: ${eksCluster.metadata.name}
            gen3.io/environment: ${schema.spec.environment}
            gen3.io/region: ${schema.spec.region}
            gen3.io/infra-outputs-secret: ${schema.spec.name}-infra-outputs
            gen3.io/fence-config-secret: ${schema.spec.name}-fence-config
            gen3.io/upload-bucket: ${schema.spec.uploadBucketName}
            gen3.io/hostname: ${schema.spec.hostname}
        type: Opaque
        stringData:
          name: ${schema.spec.name}
          server: ${eksCluster.status.?endpoint}
          config: |
            {
              "awsAuthConfig": {
                "clusterName": "${schema.spec.name}",
                "roleARN": "${argoCDSpokeRole.status.?ackResourceMetadata.?arn}"
              },
              "tlsClientConfig": {
                "insecure": false,
                "caData": "${eksCluster.status.?certificateAuthority.?data}"
              }
            }
  # ====================================================================
  # DATABASE: Aurora
  # ====================================================================
    # Aurora DB Subnet Group
    - id: dbSubnetGroup
      readyWhen:
        - ${dbSubnetGroup.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dbSubnetGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBSubnetGroup
        metadata:
          name: ${schema.spec.name}-subnet-group
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-subnet-group
          description: Subnet group for ${schema.spec.name} Aurora cluster
          subnetIDs:
            - ${dbsubnet1.status.?subnetID}
            - ${dbsubnet2.status.?subnetID}
          tags:
            - key: Name
              value: ${schema.spec.name}-subnet-group
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Aurora Cluster
    - id: auroraCluster
      readyWhen:
        - ${auroraCluster.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraCluster.status.?status.orValue('null') == 'available'}
        - ${auroraCluster.status.?endpoint.orValue('null') != 'null'}
        - ${auroraCluster.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBCluster
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbClusterIdentifier: ${schema.spec.name}
          engine: ${schema.spec.auroraEngine}
          engineMode: ${schema.spec.auroraEngineMode}
          engineVersion: ${schema.spec.auroraEngineVersion}
          masterUsername: ${schema.spec.auroraMasterUsername}
          manageMasterUserPassword: true
          masterUserSecretKMSKeyID: ${databaseKey.status.?ackResourceMetadata.?arn}
          databaseName: ${schema.spec.auroraDatabaseName}
          dbSubnetGroupName: ${dbSubnetGroup.metadata.name}
          vpcSecurityGroupIDs:
            - ${auroraSecurityGroup.status.?id}
          kmsKeyID: ${databaseKey.status.?ackResourceMetadata.?arn}
          storageEncrypted: true
          backupRetentionPeriod: 7
          preferredBackupWindow: "03:00-04:00"
          preferredMaintenanceWindow: "sun:04:00-sun:05:00"
          enableCloudwatchLogsExports:
            - postgresql
          deletionProtection: false
          tags:
            - key: Name
              value: ${schema.spec.name}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Aurora Instance 1
    - id: auroraInstance1
      readyWhen:
        - ${auroraInstance1.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraInstance1.status.?dbInstanceStatus.orValue('null') == 'available'}
        - ${auroraInstance1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBInstance
        metadata:
          name: ${schema.spec.name}-instance-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbInstanceIdentifier: ${schema.spec.name}-instance-1
          dbInstanceClass: ${schema.spec.auroraInstanceClass}
          engine: ${schema.spec.auroraEngine}
          dbClusterIdentifier: ${auroraCluster.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-instance-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # Aurora Instance 2
    - id: auroraInstance2
      readyWhen:
        - ${auroraInstance2.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraInstance2.status.?dbInstanceStatus.orValue('null') == 'available'}
        - ${auroraInstance2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBInstance
        metadata:
          name: ${schema.spec.name}-instance-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbInstanceIdentifier: ${schema.spec.name}-instance-2
          dbInstanceClass: ${schema.spec.auroraInstanceClass}
          engine: ${schema.spec.auroraEngine}
          dbClusterIdentifier: ${auroraCluster.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-instance-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
  # ====================================================================
  # BOOTSTRAP: ARGOCD CLUSTER REGISTRATION
  # ====================================================================

  # ====================================================================
  # INFRASTRUCTURE OUTPUTS SECRET
  # ====================================================================
  # Final node: emits a Secret containing all key infra outputs.
  # This bridges the infrastructure graph to downstream consumers.
  # Referenced by fleet-apps ApplicationSet for infra output injection.
    - id: infraOutputsSecret
      readyWhen:
        - ${infraOutputsSecret.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-infra-outputs
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/infra-outputs: "true"
          annotations:
            kro.run/aurora-endpoint: ${auroraCluster.status.?endpoint}
            kro.run/eks-cluster: ${eksCluster.status.?ackResourceMetadata.?arn}
        type: Opaque
        stringData:
          # Aurora
          aurora_endpoint: ${auroraCluster.status.?endpoint}
          aurora_reader_endpoint: ${auroraCluster.status.?readerEndpoint}
          aurora_cluster_arn: ${auroraCluster.status.?ackResourceMetadata.?arn}
          aurora_master_username: ${schema.spec.auroraMasterUsername}
          aurora_database_name: ${schema.spec.auroraDatabaseName}
          # EKS
          eks_cluster_name: ${eksCluster.metadata.name}
          eks_endpoint: ${eksCluster.status.?endpoint}
          eks_ca_data: ${eksCluster.status.?certificateAuthority.?data}
          eks_cluster_arn: ${eksCluster.status.?ackResourceMetadata.?arn}
          # Network
          vpc_id: ${vpc.status.?vpcID}
          private_subnet_ids: "${privatesubnet1.status.?subnetID},${privatesubnet2.status.?subnetID}"
          db_subnet_ids: "${dbsubnet1.status.?subnetID},${dbsubnet2.status.?subnetID}"
          public_subnet_ids: "${publicsubnet1.status.?subnetID},${publicsubnet2.status.?subnetID}"
          # S3
          logging_bucket_arn: ${loggingBucket.status.?ackResourceMetadata.?arn}
          data_bucket_arn: ${dataBucket.status.?ackResourceMetadata.?arn}
          upload_bucket_arn: ${uploadBucket.status.?ackResourceMetadata.?arn}
          # KMS
          logging_key_arn: ${loggingKey.status.?ackResourceMetadata.?arn}
          database_key_arn: ${databaseKey.status.?ackResourceMetadata.?arn}
          platform_key_arn: ${platformKey.status.?ackResourceMetadata.?arn}
          # Security Groups
          eks_security_group_id: ${eksSecurityGroup.status.?id}
          aurora_security_group_id: ${auroraSecurityGroup.status.?id}
          # IAM
          cluster_role_arn: ${clusterRole.status.?ackResourceMetadata.?arn}
          node_role_arn: ${nodeRole.status.?ackResourceMetadata.?arn}
          argocd_spoke_role_arn: ${argoCDSpokeRole.status.?ackResourceMetadata.?arn}
          # Metadata
          environment: ${schema.spec.environment}
          region: ${schema.spec.region}
          name: ${schema.spec.name}
  # ====================================================================
  # FENCE CONFIG — AWS Secrets Manager
  # ====================================================================
  # Fence-config is a YAML document containing OIDC provider settings,
  # S3 bucket references, and other fence configuration.  It is stored
  # as a single string value in AWS Secrets Manager so the ExternalSecrets
  # operator on the spoke cluster can pull it into a K8s Secret.
  #
  # Flow:  K8s Secret (staging) → ACK SM Secret → AWS SM → ESO → spoke K8s Secret
  #
  # OIDC client secrets are NOT stored here — they should be pre-populated
  # in AWS Secrets Manager as separate secrets and referenced from the
  # fence-config YAML.  This template provides the structural config only.
  # Populate real OIDC credentials in the SM secret after initial deployment.

    # Stage the fence-config YAML content in a K8s Secret (CSOC-side).
    # ACK SM controller reads from this to push to AWS Secrets Manager.
    - id: fenceConfigContent
      readyWhen:
        - ${fenceConfigContent.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-fence-config-content
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/component: fence-config
        type: Opaque
        stringData:
          fence-config.yaml: |
            BASE_URL: 'https://${schema.spec.hostname}/user'
            DEBUG: false
            ARBORIST: 'http://arborist-service'
            INDEXD: 'http://indexd-service'
            OPENID_CONNECT:
              google:
                discovery_url: 'https://accounts.google.com/.well-known/openid-configuration'
                redirect_url: '{{"{{"}}BASE_URL}}/login/google/login/'
                scope: 'openid email'
                client_id: 'REPLACE_WITH_GOOGLE_CLIENT_ID'
                client_secret: 'REPLACE_WITH_GOOGLE_CLIENT_SECRET'
            DEFAULT_LOGIN_IDP: '${schema.spec.defaultLoginIDP}'
            DEFAULT_LOGIN_URL: '{{"{{"}}BASE_URL}}/login/${schema.spec.defaultLoginIDP}'
            LOGIN_OPTIONS:
              - name: 'Login from Google'
                desc: ''
                idp: google
            S3_BUCKETS:
              ${schema.spec.uploadBucketName}:
                cred: 'fence-bot'
                region: ${schema.spec.region}
            DATA_UPLOAD_BUCKET: '${schema.spec.uploadBucketName}'
            dbGaP:
              parent_to_child_studies_mapping: {}

    # Push the fence-config content to AWS Secrets Manager via ACK.
    # The ExternalSecrets operator on the spoke reads this SM secret.
    - id: fenceConfigSmSecret
      readyWhen:
        - ${fenceConfigSmSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-fence-config
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-fence-config
          description: "Fence configuration for Gen3 deployment on ${schema.spec.name}"
          secretString:
            name: ${schema.spec.name}-fence-config-content
            namespace: ${schema.spec.namespace}
            key: fence-config.yaml
          tags:
            - key: Name
              value: ${schema.spec.name}-fence-config
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
