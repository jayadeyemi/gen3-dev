# CEL Expressions Test Instance
#
# Tests advanced CEL features: ternary, string ops, math, optional chaining.
#
# Expected results:
#   - ConfigMap cel-test-ternary:
#       tier_label: "NON-PRODUCTION"
#       ha_mode: "single-instance"
#       env_type: "development"
#   - ConfigMap cel-test-string-ops:
#       dns_first_part: "app"
#       dns_partials: "app.staging"
#       full_name: "cel-test-dev-dev"
#   - ConfigMap cel-test-math-json:
#       replica_count: "1"
#       doubled_replicas: "2"
#       dns_parts_count: "4"

apiVersion: v1alpha1
kind: KroCELTest
metadata:
  name: cel-test
  namespace: default
spec:
  name: cel-test
  namespace: kro-test-cel
  environment: dev
  fullDNSName: "app.staging.example.com"
  tagList: "env:dev,team:platform,project:gen3"
  tier: dev
  replicas: 1
  optionalLabel: ""
---
# CEL Test Instance — Production settings
#
# Expected results (different ternary paths):
#   - tier_label: "PRODUCTION"
#   - ha_mode: "high-availability"
#   - env_type: "production"

apiVersion: v1alpha1
kind: KroCELTest
metadata:
  name: cel-test-prod
  namespace: default
spec:
  name: cel-prod
  namespace: kro-test-cel-prod
  environment: prod
  fullDNSName: "gen3.production.iu.edu"
  tagList: "env:prod,team:ops"
  tier: production
  replicas: 3
  optionalLabel: "production-critical"
