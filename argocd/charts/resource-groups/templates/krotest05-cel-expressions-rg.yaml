# KRO Capability Test 5: CEL Expressions
#
# Tests advanced CEL expression capabilities in KRO templates.
# Uses K8s-native ConfigMaps (no AWS cost).
#
# Validates:
#   - Ternary expressions (condition ? true : false)
#   - String operations (split, join, slice)
#   - Optional chaining with .orValue()
#   - json.marshal for complex data
#   - Math operations
#   - String concatenation and formatting
#
# Usage:
#   kubectl apply -f argocd/charts/resource-groups/templates/05-cel-expressions-rg.yaml
#   kubectl apply -f argocd/charts/resource-groups/templates/instances/05-cel-expressions-instance.yaml
#   kubectl get kroceltest -w

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: kro-cel-test
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: KroCELTest
    spec:
      name: string | required=true
      namespace: string | default="kro-test"
      environment: string | default="dev"

      # String operations inputs
      fullDNSName: string | default="app.staging.example.com"
      tagList: string | default="env:dev,team:platform,project:gen3"

      # Ternary/conditional inputs
      tier: string | default="dev"
      replicas: integer | default=1

      # Optional field (may be empty)
      optionalLabel: string | default=""

    status:
      namespacePhase: ${targetNamespace.status.phase}
      ternaryResult: ${ternaryConfig.data.tier_label}
      splitResult: ${stringOpsConfig.data.dns_first_part}

  resources:
    # ================================================================
    # Layer 0: Namespace
    # ================================================================
    - id: targetNamespace
      readyWhen:
        - ${targetNamespace.status.phase == "Active"}
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            test-suite: kro-capabilities
            test-name: cel-expressions

    # ================================================================
    # Layer 1: Ternary expressions
    # ================================================================
    - id: ternaryConfig
      readyWhen:
        - ${ternaryConfig.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-ternary
          namespace: ${targetNamespace.metadata.name}
          labels:
            test-suite: kro-capabilities
            test-name: cel-ternary
            # Ternary in label value
            tier-class: "${schema.spec.tier == 'production' ? 'critical' : 'standard'}"
        data:
          # Simple ternary
          tier_label: "${schema.spec.tier == 'production' ? 'PRODUCTION' : 'NON-PRODUCTION'}"
          # Ternary with integer comparison
          ha_mode: "${schema.spec.replicas > 1 ? 'high-availability' : 'single-instance'}"
          # Nested string check
          env_type: "${schema.spec.environment == 'prod' ? 'production' : (schema.spec.environment == 'staging' ? 'pre-production' : 'development')}"

    # ================================================================
    # Layer 1: String operations
    # ================================================================
    - id: stringOpsConfig
      readyWhen:
        - ${stringOpsConfig.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-string-ops
          namespace: ${targetNamespace.metadata.name}
          labels:
            test-suite: kro-capabilities
            test-name: cel-string-ops
        data:
          # split — extract hostname from DNS
          dns_first_part: ${schema.spec.fullDNSName.split('.')[0]}
          # Ternary with split/size/slice
          dns_partials: "${size(schema.spec.fullDNSName.split('.')) > 2 ? schema.spec.fullDNSName.split('.').slice(0, 2).join('.') : schema.spec.fullDNSName}"
          # String concatenation
          full_name: "${schema.spec.name}-${schema.spec.environment}-${schema.spec.tier}"
          # Optional chaining on a field that exists
          optional_value: "${schema.spec.optionalLabel != '' ? schema.spec.optionalLabel : 'default-label'}"

    # ================================================================
    # Layer 1: Math and json operations
    # ================================================================
    - id: mathJsonConfig
      readyWhen:
        - ${mathJsonConfig.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-math-json
          namespace: ${targetNamespace.metadata.name}
          labels:
            test-suite: kro-capabilities
            test-name: cel-math-json
        data:
          # Integer to string
          replica_count: "${string(schema.spec.replicas)}"
          # Math: double replicas
          doubled_replicas: "${string(schema.spec.replicas * 2)}"
          # Size of split result
          dns_parts_count: "${string(size(schema.spec.fullDNSName.split('.')))}"
