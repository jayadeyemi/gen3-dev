# includeWhen Test Instance — Partial Features
#
# Tests with featureA=true, featureB=false, featureC=false, tier=dev
#
# Expected results:
#   - featureAConfig: CREATED (featureA=true)
#   - featureBConfig: EXCLUDED (featureB=false)
#   - featureABConfig: EXCLUDED (needs both A AND B)
#   - tierConfig: EXCLUDED (needs staging or production)
#   - cascadeChild: EXCLUDED (featureC=false)

apiVersion: v1alpha1
kind: KroIncludeWhenTest
metadata:
  name: includewhen-partial
  namespace: default
spec:
  name: iw-partial
  namespace: kro-test-includewhen
  environment: test
  featureA: true
  featureB: false
  featureC: false
  tier: dev
---
# includeWhen Test Instance — All Features Enabled
#
# Tests with all features=true, tier=production
#
# Expected results:
#   - featureAConfig: CREATED
#   - featureBConfig: CREATED
#   - featureABConfig: CREATED (both A AND B true)
#   - tierConfig: CREATED (tier=production matches OR condition)
#   - cascadeChild: CREATED (featureC=true + featureA dependency met)

apiVersion: v1alpha1
kind: KroIncludeWhenTest
metadata:
  name: includewhen-full
  namespace: default
spec:
  name: iw-full
  namespace: kro-test-includewhen-full
  environment: test
  featureA: true
  featureB: true
  featureC: true
  tier: production
