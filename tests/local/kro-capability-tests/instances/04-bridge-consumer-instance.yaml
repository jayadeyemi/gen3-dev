# Bridge Consumer Test Instance
#
# Reads the bridge Secret created by Test 3's producer and uses its
# data to create new ConfigMaps. Validates cross-RGD data flow.
#
# Prerequisite: Test 3 (bridge-producer-test) must be Active first.
#
# Expected results:
#   - ConfigMap bridge-cons-consumer-result with data from bridge Secret
#   - ConfigMap bridge-cons-downstream with chained data
#   - Status shows consumed VPC ID and KMS ARN from producer

apiVersion: v1alpha1
kind: KroBridgeConsumer
metadata:
  name: bridge-consumer-test
  namespace: default
spec:
  name: bridge-cons
  namespace: kro-test-bridge
  environment: test
  bridgeSecretName: bridge-prod-bridge-outputs
