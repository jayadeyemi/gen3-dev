# KRO Capability Test Instances — gen3-dev
#
# All instances are COMMENTED OUT by default.
# Uncomment individual blocks to deploy specific tests via ArgoCD.
#
# ── How to activate ─────────────────────────────────────────────────────────
# This file is NOT automatically picked up by the local-infra-instances
# ApplicationSet (which reads only infrastructure.yaml). To deploy tests
# via ArgoCD, either:
#   A) Copy the instance block(s) you want into infrastructure.yaml, OR
#   B) Wire this file in as a second valueFiles entry in
#      argocd/bootstrap/local-infra-instances.yaml:
#        valueFiles:
#          - '$values/.../infrastructure.yaml'
#          - '$values/.../tests.yaml'   ← add this line
#
# To deploy ad-hoc (bypassing ArgoCD), uncomment the block and run:
#   helm template infrastructure-instance argocd/charts/instances/ \
#     -f argocd/cluster-fleet/local-aws-dev/tests.yaml | kubectl apply -f -
#
# ── Test inventory ───────────────────────────────────────────────────────────
# Test 01 — forEach          (pure K8s, zero AWS cost)
# Test 02 — includeWhen      (pure K8s, zero AWS cost)
# Test 03 — bridge-producer  (pure K8s, zero AWS cost)
# Test 04 — bridge-consumer  (pure K8s, zero AWS cost)
# Test 05 — CEL expressions  (pure K8s, zero AWS cost)
# Test 06 — SG conditional   (REAL AWS: VPC + SecurityGroups, ~$0/mo)
# Test 07a — cross-RGD producer (REAL AWS: VPC + SecurityGroup, ~$0/mo)
# Test 07b — cross-RGD consumer (REAL AWS: SecurityGroup, ~$0/mo)
#
# See: outputs/plans/03-kro-capability-test-report.md for test findings.
# ────────────────────────────────────────────────────────────────────────────

