# Bridge Producer Test Instance
#
# Creates simulated infrastructure ConfigMaps + bridge Secret
# containing aggregated outputs for downstream consumption.
#
# Expected results:
#   - Namespace kro-test-bridge created
#   - ConfigMap bridge-prod-network-config (simulated VPC data)
#   - ConfigMap bridge-prod-storage-config (simulated KMS/S3 data)
#   - Secret bridge-prod-bridge-outputs (aggregated bridge Secret)

apiVersion: v1alpha1
kind: KroBridgeProducer
metadata:
  name: bridge-producer-test
  namespace: default
spec:
  name: bridge-prod
  namespace: kro-test-bridge
  environment: test
  vpcCIDR: "10.0.0.0/16"
  subnetCount: "2"
  createBridgeSecret: true
