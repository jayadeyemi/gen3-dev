# ======================================================================
# local-infra-instances — KRO infrastructure instances for gen3-dev
# ======================================================================
# Mirrors gen3-kro's fleet-infra-instances.yaml pattern.
# Applies raw KRO Custom Resource YAMLs directly from two directories:
#   cluster-fleet/<cluster>/infrastructure/  — production RGD instances
#   cluster-fleet/<cluster>/tests/           — KRO capability test instances
#
# Each instance is a standalone YAML file. ArgoCD uses directory source
# to apply raw KRO CR YAML directly.
#
# NAMESPACE PREREQUISITE: Spoke namespaces (e.g. 'spoke1' for infrastructure,
# 'kro-test-sg' for real-AWS tests) must exist with the
# services.k8s.aws/owner-account-id annotation set.
# This is handled by kind-local-test.sh (stage_install and stage_inject_creds).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-infra-instances
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: control-plane
  template:
    metadata:
      name: '{{.name}}-infra-instance'
    spec:
      project: default
      sources:
      # Directory source 1: production infrastructure KRO CR instances
      - repoURL: '{{.metadata.annotations.addons_repo_url}}'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
        path: '{{.metadata.annotations.addons_repo_basepath}}cluster-fleet/{{.name}}/infrastructure/'
        directory:
          recurse: false
          include: '*.yaml'
      # Directory source 2: KRO capability test instances
      - repoURL: '{{.metadata.annotations.addons_repo_url}}'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
        path: '{{.metadata.annotations.addons_repo_basepath}}cluster-fleet/{{.name}}/tests/'
        directory:
          recurse: false
          include: '*.yaml'
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: true
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
      ignoreDifferences:
        - kind: Namespace
          jsonPointers:
            - /metadata/labels
            - /metadata/annotations
            - /metadata/finalizers
