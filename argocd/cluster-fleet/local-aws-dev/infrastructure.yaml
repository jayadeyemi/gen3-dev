# infrastructure.yaml — Production KRO instance declarations for gen3-dev
#
# Consumed by local-infra-instances.yaml bootstrap ApplicationSet
# via the instances chart.
#
# Active instances are uncommented. Commented blocks are reference stubs
# showing the full spec for each registered RGD.
#
# KRO capability test instances have been moved to tests.yaml.
# See: argocd/cluster-fleet/local-aws-dev/tests.yaml
#
# NOTE: accountID is NOT stored here. It is resolved at runtime via
# aws sts get-caller-identity and set as an annotation on the ArgoCD
# cluster Secret. The local-infra-instances ApplicationSet passes it
# to the instances chart as a Helm parameter (awsAccountId), which
# annotates namespaces with services.k8s.aws/owner-account-id.
#
# Sync-wave ordering (matches gen3-kro):
#   Wave  1:  ACK controllers
#   Wave 10:  RGDs
#   Wave 15:  Tier 0 instances (Foundation)
#   Wave 20:  Tier 1 instances (Database — depends on Foundation bridge)
#   Wave 25:  Tier 3 instances (Compute  — depends on Foundation bridge)
# ─────────────────────────────────────────────────────────────────────────────

instances: {}

